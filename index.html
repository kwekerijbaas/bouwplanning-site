<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#2d6a4f">
<title>Reparatieplanning Kwekerij Baas</title>
<style>
:root{
  --groen:#2d6a4f; --groen-licht:#52b788; --bg:#f2f4f3; --kaart:#ffffff;
  --tekst:#1b2a24; --grijs:#6c757d; --lijn:#e3e7e5; --rood:#c1442e; --oranje:#f2a541;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--tekst);font-size:15px;-webkit-tap-highlight-color:transparent}
button{font:inherit;cursor:pointer;border:none;background:none}
input,select{font:inherit}
#topbar{position:sticky;top:0;z-index:30;background:var(--groen);color:#fff;padding:10px 14px;display:flex;align-items:center;gap:10px}
#topbar h1{font-size:16px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#topbar .wie{font-size:12px;opacity:.85;cursor:pointer}
#tabs{position:sticky;top:44px;z-index:29;display:flex;background:var(--kaart);border-bottom:1px solid var(--lijn);overflow-x:auto}
#tabs button{flex:1;min-width:70px;padding:10px 4px;font-size:13px;color:var(--grijs);border-bottom:3px solid transparent;white-space:nowrap}
#tabs button.actief{color:var(--groen);border-bottom-color:var(--groen);font-weight:600}
#tabs button .bol{display:inline-block;min-width:17px;padding:0 4px;border-radius:9px;background:var(--rood);color:#fff;font-size:11px;margin-left:3px}
main{padding:12px;max-width:1200px;margin:0 auto;padding-bottom:40px}
.kaart{background:var(--kaart);border:1px solid var(--lijn);border-radius:10px;padding:12px;margin-bottom:10px}
.kaart h2{font-size:14px;margin-bottom:8px;color:var(--groen)}
.kaart h3{font-size:13px;margin:10px 0 4px}
.regel{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--lijn)}
.regel:last-child{border-bottom:none}
.chip{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;color:#fff;white-space:nowrap}
.stil{color:var(--grijs);font-size:12px}
.knop{background:var(--groen);color:#fff;padding:8px 14px;border-radius:8px;font-size:14px;font-weight:600}
.knop.licht{background:#e8f0ec;color:var(--groen)}
.knop.rood{background:var(--rood)}
.knop.klein{padding:4px 10px;font-size:12px}
.statusknop{padding:4px 10px;border-radius:12px;font-size:12px;font-weight:600;border:1.5px solid var(--lijn);background:#fff;min-width:64px}
.statusknop.todo{color:var(--grijs)}
.statusknop.bezig{color:#fff;background:var(--oranje);border-color:var(--oranje)}
.statusknop.klaar{color:#fff;background:var(--groen-licht);border-color:var(--groen-licht)}
.statusknop.nvt{color:#aaa;text-decoration:line-through}
input[type=date],input[type=text],input[type=number],select{border:1px solid var(--lijn);border-radius:7px;padding:7px 8px;background:#fff;max-width:100%}
input[type=number]{width:60px;text-align:center}
input[type=checkbox]{width:20px;height:20px;accent-color:var(--groen)}
.dagnav{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.dagnav .datum{flex:1;text-align:center;font-weight:600;font-size:15px}
.dagnav button{background:var(--kaart);border:1px solid var(--lijn);border-radius:8px;padding:8px 14px;font-size:16px}
/* weekgrid */
#wg{overflow-x:auto;background:var(--kaart);border:1px solid var(--lijn);border-radius:10px}
#wg table{border-collapse:collapse;min-width:100%}
#wg th,#wg td{border-bottom:1px solid var(--lijn);border-right:1px solid #eef1ef;padding:0;font-size:11px}
#wg th{background:#f7f9f8;padding:4px 6px;font-weight:600;color:var(--grijs);text-align:center;white-space:nowrap}
#wg th.wknu{background:var(--groen);color:#fff}
#wg th.wkhuidig{border-bottom:3px solid var(--groen)}
#wg th[data-week]{position:relative}
.kolgreep{position:absolute;top:0;right:0;width:10px;height:100%;cursor:col-resize;touch-action:none;border-right:3px solid transparent}
.kolgreep:hover{border-right-color:var(--groen-licht)}
#wg td.naam,#wg th.naam{position:sticky;left:0;background:var(--kaart);text-align:left;padding:5px 8px;font-size:12px;white-space:nowrap;z-index:2;border-right:2px solid var(--lijn);max-width:130px;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
#wg tr.blokkop td{background:#eef4f1;font-weight:600;color:var(--groen);padding:4px 8px;font-size:11px}
#wg tr.lockop td{background:var(--groen);color:#fff;font-weight:700;padding:5px 8px;font-size:12px}
.wcel{height:30px;min-width:44px;position:relative;display:flex;flex-direction:column;justify-content:center;gap:1px;padding:1px 2px}
.wcel.breed{height:auto;min-height:34px;display:block;padding:3px 4px}
.wblok{font-size:11px;line-height:1.35;background:#fff;border:1px solid var(--lijn);border-left-width:4px;border-radius:6px;padding:3px 6px;margin:2px 0;white-space:normal;text-align:left}
/* afdeling-agenda */
.agcel{min-height:24px;display:flex;align-items:center;justify-content:center;gap:1px;padding:1px;position:relative}
.agcel[data-agdag]{cursor:pointer}
.agcel[data-agdag]:hover{background:#eef4f1}
.agcel.agdoel{background:rgba(45,106,79,.16)}
.agbalk{height:16px;width:100%;min-width:18px;border-radius:3px;cursor:pointer}
.agbalk.agnieuw{outline:2px solid var(--oranje)}
.aggreep{position:absolute;top:50%;right:-2px;transform:translateY(-50%);width:18px;height:26px;cursor:col-resize;touch-action:none;z-index:3;display:flex;align-items:center;justify-content:center}
.aggreep i{width:4px;height:15px;border-radius:2px;background:#fff;box-shadow:0 0 0 1.5px rgba(0,0,0,.35)}
.agskip{height:16px;width:100%;min-width:18px;border-radius:3px;background:repeating-linear-gradient(45deg,#e8e8e8,#e8e8e8 3px,#fff 3px,#fff 6px);cursor:pointer}
.aglev{font-size:13px}
.aglev.ok{opacity:.45}
.agklik{cursor:pointer}
.wseg{height:8px;border-radius:3px;min-width:8px}
.wlev{position:absolute;top:1px;right:2px;width:8px;height:8px;border-radius:50%;background:var(--rood);border:1.5px solid #fff}
.wlev.ok{background:var(--groen-licht)}
.legenda{display:flex;flex-wrap:wrap;gap:6px 12px;margin:10px 2px;font-size:11px;color:var(--grijs)}
.legenda span{display:flex;align-items:center;gap:4px}
.legenda i{width:10px;height:10px;border-radius:3px;display:inline-block}
/* afdeling detail */
.actrij{display:flex;align-items:center;gap:6px;padding:8px 0;border-bottom:1px solid var(--lijn)}
.actrij .nm{flex:1;min-width:0}
.actrij .nm .naam{font-size:14px}
.actrij .nm .datums{font-size:11px;color:var(--grijs)}
.pijl{width:30px;height:30px;border-radius:7px;border:1px solid var(--lijn);background:#fff;font-size:13px;color:var(--grijs)}
.terug{color:var(--groen);font-weight:600;margin-bottom:8px;display:inline-block;font-size:14px}
.afdkop{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.afdkop .titel{font-size:18px;font-weight:700}
.instelrij{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:6px 0}
.instelrij label{font-size:13px;color:var(--grijs)}
/* voorstel */
.voorstel{border-left:4px solid var(--oranje);padding-left:10px}
.voorstel .bron{font-size:11px;color:var(--grijs);margin-bottom:2px}
.voorstel .knoppen{display:flex;gap:8px;margin-top:8px}
/* klikknoppen ipv dropdowns */
.keuze{display:flex;gap:6px;flex-wrap:wrap}
.keuze button{padding:8px 14px;border:1.5px solid var(--lijn);border-radius:9px;background:#fff;font-size:14px;color:var(--tekst)}
.keuze button.aan{background:var(--groen);border-color:var(--groen);color:#fff;font-weight:600}
.stepper{display:flex;align-items:center;gap:2px}
.stepper input{width:44px;text-align:center}
.stap{width:30px;height:34px;border:1px solid var(--lijn);border-radius:7px;background:#fff;font-size:16px;color:var(--groen);font-weight:700}
#sheet{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;justify-content:center;z-index:110}
.sheetkaart{background:#fff;border-radius:14px 14px 0 0;padding:16px;width:100%;max-width:560px;display:flex;flex-direction:column;gap:10px;max-height:92vh;overflow:auto}
.sheettitel{font-weight:700;font-size:15px}
.sheetrij{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.knop.breed{width:100%;text-align:center}
@media(min-width:700px){#sheet{align-items:center} .sheetkaart{border-radius:14px}}
/* inklappen + week/dag navigatie */
.klap{cursor:pointer;user-select:none}
.dagkop{cursor:pointer}
#wg th[data-week],#wg th[data-dag]{cursor:pointer}
.dagknop{font-size:11px;padding:2px 8px;border:1px solid var(--lijn);border-radius:8px;background:#fff;color:var(--groen);font-weight:600}
/* leverkalender */
.kalkop{display:grid;grid-template-columns:repeat(7,1fr);font-size:11px;color:var(--grijs);text-align:center;margin-bottom:2px}
.kalrij{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:2px}
.kaldag{border:1px solid var(--lijn);border-radius:7px;min-height:46px;padding:3px;cursor:pointer;background:#fff}
.kaldag.buiten{opacity:.35}
.kaldag.nu{border-color:var(--groen);border-width:2px}
.kaldag.sel{background:#e8f0ec;border-color:var(--groen)}
.kalnr{font-size:11px;color:var(--grijs)}
.kaldots{display:flex;flex-wrap:wrap;gap:2px;margin-top:2px}
.kalbalk{font-size:10px;line-height:1.25;background:#fff;border:1px solid var(--lijn);border-left-width:4px;border-radius:5px;padding:1px 3px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.kalbalk.ok{opacity:.45}
.ldot{width:9px;height:9px;border-radius:50%;display:inline-block;flex:none}
/* taken, voortgang, foto's */
.thumb{height:64px;border-radius:8px;border:1px solid var(--lijn);object-fit:cover}
.thumbs{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.balk{background:#e4eae6;border-radius:6px;height:10px;overflow:hidden;flex:1;min-width:80px}
.balk div{background:var(--groen-licht);height:100%}
.deadline-oud{color:var(--rood);font-weight:600}
/* login */
#login{position:fixed;inset:0;background:var(--groen);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
#login .paneel{background:#fff;border-radius:14px;padding:26px 22px;width:100%;max-width:340px;display:flex;flex-direction:column;gap:12px}
#login h1{font-size:19px;color:var(--groen)}
#login .fout{color:var(--rood);font-size:13px;display:none}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:120;max-width:90vw}
#toast.zien{opacity:1}
.leeg{color:var(--grijs);font-size:13px;padding:8px 0}
details.log summary{font-size:13px;color:var(--grijs);cursor:pointer;padding:4px 0}
details.log .regel{font-size:12px;color:var(--grijs)}
@media(min-width:700px){ #tabs button{flex:0 0 auto;padding:10px 22px} body{font-size:15px} }
</style>
</head>
<body>
<div id="login" style="display:none">
  <div class="paneel">
    <h1>🌱 Reparatieplanning<br>Kwekerij Baas</h1>
    <label>Toegangscode<br><input type="password" id="lg-code" style="width:100%" autocomplete="current-password"></label>
    <div class="fout" id="lg-fout">Code klopt niet, probeer opnieuw.</div>
    <div style="font-size:13px;color:var(--grijs)">Tik je naam om in te loggen:</div>
    <div class="keuze" id="lg-namen">
      <button data-naam="Jarno">Jarno</button>
      <button data-naam="Dieter">Dieter</button>
      <button data-naam="Anders">Anders</button>
    </div>
    <button class="knop licht" id="lg-sluit" style="display:none">Annuleren</button>
  </div>
</div>
<div id="topbar"><h1>🌱 Reparatieplanning</h1><span class="wie" id="tb-wie"></span></div>
<div id="tabs"></div>
<main id="app"></main>
<div id="sheet"></div>
<div id="toast"></div>
<script>
'use strict';
const API = 'https://hlgvtxcwbhrbbcozvsen.supabase.co/functions/v1/planning/api';
const NL = String.fromCharCode(10);
const KLEUREN = {
 'Veiligstellen glas':'#8d99ae',
 'Schermdoekprofielen vastknopen':'#b5838d',
 'Atlasdraden verwijderen':'#e07a5f',
 'Gronddoeken verwijderen':'#bc6c25',
 'Beglazen':'#1d70b8',
 'Nieuwe atlasdraden trekken':'#f2a541',
 'Schermdoek nakijken / repareren':'#9b5de5',
 'Nieuwe schermdoek plaatsen':'#6a4c93',
 'Vloer egaliseren':'#6c757d',
 'Gronddoeken leggen':'#52b788',
 'Kas gereed':'#2d6a4f'
};
const MAT_KLEUR = {glas:'#1d70b8', schermdoek:'#9b5de5', gronddoek:'#52b788', atlasdraad:'#f2a541', overig:'#6c757d'};
const LEV_PALET=['#1d70b8','#e07a5f','#9b5de5','#2d6a4f','#f2a541','#c1442e','#52b788','#6a4c93','#bc6c25','#8d99ae'];
function levKleur(naam){ let n=0; const s=String(naam||''); for(let i=0;i<s.length;i++) n=(n+s.charCodeAt(i)*(i+1))%LEV_PALET.length; return LEV_PALET[n]; }
const S = { data:null, view:'week', dag:vandaagISO(), selAfd:null, weekStart:null,
  levMaand:null, levMat:null, levBedrijf:null, levDag:null, nlBedrijf:null, ntAfd:null, ntBedrijf:null, weekBlok:null, dagBlok:null, takBedrijf:null, wkStart:null, wkVenster:null, kolBreedte:null, agStart:null, gewijzigd:null, afdTerug:null,
  code:localStorage.getItem('rp_code')||'', wie:localStorage.getItem('rp_wie')||'' };
function dichtSet(){ try{ return new Set(JSON.parse(localStorage.getItem('rp_dicht')||'[]')); }catch(e){ return new Set(); } }
function dichtToggle(key){ const s=dichtSet(); if(s.has(key)) s.delete(key); else s.add(key);
  localStorage.setItem('rp_dicht', JSON.stringify(Array.from(s))); }
function filterSet(){ try{ return new Set(JSON.parse(localStorage.getItem('rp_filter')||'[]')); }catch(e){ return new Set(); } }
function filterToggle(id){ const s=filterSet(); if(s.has(id)) s.delete(id); else s.add(id);
  localStorage.setItem('rp_filter', JSON.stringify(Array.from(s))); }
function filterWis(){ localStorage.removeItem('rp_filter'); }
function bedrijfNaam(id){ const b=(S.data.bedrijven||[]).find(x=>x.id===id); return b?b.naam:null; }
function levBedrijfNaam(l){ return l.bedrijf_id ? (bedrijfNaam(l.bedrijf_id)||l.leverancier) : l.leverancier; }
function bedrijfDot(naam){ return '<i class="ldot" style="background:'+levKleur(naam)+'"></i> '; }
function bedrijfVan(afd,a){
  if(a.bedrijf_id){ const n=bedrijfNaam(a.bedrijf_id); return n?{naam:n,afwijkend:true}:null; }
  const t=(S.data.toewijzingen||[]).find(x=>x.locatie_id===afd.locatie_id&&x.activiteit_naam===a.naam);
  if(t&&t.bedrijf_id){ const n=bedrijfNaam(t.bedrijf_id); return n?{naam:n,afwijkend:false}:null; }
  return null;
}
function bedrijfKiezer(titel, huidigId, cb){
  const sh=document.getElementById('sheet');
  const dichtFn=()=>{sh.style.display='none';sh.innerHTML='';};
  const maak=()=>{
    sh.innerHTML='<div class="sheetkaart"><div class="sheettitel">'+esc(titel)+'</div>'
      +'<div class="keuze">'
      +'<button data-bid="std" class="'+(huidigId==null?'aan':'')+'">standaard / geen</button>'
      +(S.data.bedrijven||[]).map(b=>'<button data-bid="'+b.id+'" class="'+(huidigId===b.id?'aan':'')+'">'+bedrijfDot(b.naam)+esc(b.naam)+'</button>').join('')
      +'</div>'
      +'<div class="sheetrij"><input type="text" id="sh-nieuw-bedrijf" placeholder="nieuw bedrijf…" style="flex:1"><button class="knop klein" id="sh-nieuw-ok">+ toevoegen</button></div>'
      +'<button class="knop licht breed" id="sh-sluit2">Sluiten</button></div>';
    sh.style.display='flex';
    sh.onclick=e=>{ if(e.target===sh) dichtFn(); };
    document.getElementById('sh-sluit2').onclick=dichtFn;
    sh.querySelectorAll('button[data-bid]').forEach(b=>b.onclick=()=>{ dichtFn(); cb(b.dataset.bid==='std'?null:+b.dataset.bid); });
    document.getElementById('sh-nieuw-ok').onclick=async()=>{
      const v=document.getElementById('sh-nieuw-bedrijf').value.trim();
      if(!v) return;
      try{ await api({action:'bedrijf_add',naam:v,log:'Bedrijf toegevoegd: '+v}); await laad(); maak(); }
      catch(e){ toast('Toevoegen mislukt'); }
    };
  };
  maak();
}
function filterSheet(){
  const sh=document.getElementById('sheet');
  const dichtFn=()=>{sh.style.display='none';sh.innerHTML='';render();};
  const maak=()=>{
    const verborgen=filterSet();
    let x='<div class="sheetkaart"><div class="sheettitel">🔍 Toon / verberg afdelingen</div>'
      +'<div class="stil">Groen = zichtbaar. Tik een afdeling om hem te verbergen of weer te tonen.</div>';
    for(const loc of S.data.locaties.sort((a,b)=>a.sort-b.sort)){
      x+='<div style="font-weight:600;font-size:13px;margin-top:4px">'+esc(loc.code)+'</div><div class="keuze">';
      for(const afd of S.data.afdelingen.filter(a=>a.locatie_id===loc.id&&a.actief).sort((a,b)=>a.sort-b.sort)){
        x+='<button data-fa="'+afd.id+'" class="'+(verborgen.has(afd.id)?'':'aan')+'">'+esc(isNaN(+afd.code)?afd.code:('afd '+afd.code))+'</button>';
      }
      x+='</div>';
    }
    x+='<div class="sheetrij"><button class="knop klein licht" id="sh-alles">alles tonen</button><button class="knop" id="sh-klaar" style="flex:1;text-align:center">Klaar</button></div></div>';
    sh.innerHTML=x; sh.style.display='flex';
    sh.onclick=e=>{ if(e.target===sh) dichtFn(); };
    sh.querySelectorAll('button[data-fa]').forEach(b=>b.onclick=()=>{ filterToggle(+b.dataset.fa); maak(); });
    document.getElementById('sh-alles').onclick=()=>{ filterWis(); maak(); };
    document.getElementById('sh-klaar').onclick=dichtFn;
  };
  maak();
}

/* ---------- datums ---------- */
function vandaagISO(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function pd(iso){ if(!iso)return null; const p=iso.slice(0,10).split('-'); return new Date(Date.UTC(+p[0],+p[1]-1,+p[2])); }
function iso(d){ return d.toISOString().slice(0,10); }
function fmt(d){ if(!d)return '—'; const dg=['zo','ma','di','wo','do','vr','za'][d.getUTCDay()];
  return dg+' '+d.getUTCDate()+'-'+(d.getUTCMonth()+1); }
function fmtLang(d){ if(!d)return '—'; const dg=['zondag','maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag'][d.getUTCDay()];
  const mnd=['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'][d.getUTCMonth()];
  return dg+' '+d.getUTCDate()+' '+mnd; }
function isoWeek(d){ const t=new Date(Date.UTC(d.getUTCFullYear(),d.getUTCMonth(),d.getUTCDate()));
  const day=(t.getUTCDay()+6)%7; t.setUTCDate(t.getUTCDate()-day+3);
  const jan4=new Date(Date.UTC(t.getUTCFullYear(),0,4));
  return {jaar:t.getUTCFullYear(), week:1+Math.round(((t-jan4)/86400000 - 3 + ((jan4.getUTCDay()+6)%7))/7)}; }
function maandagVan(d){ const t=new Date(d); t.setUTCDate(t.getUTCDate()-((t.getUTCDay()+6)%7)); return t; }
function werkdag(d,wpw){ const dow=d.getUTCDay(); if(wpw>=7)return true; if(wpw===6)return dow!==0; return dow>=1&&dow<=5; }
function volgendeWerkdag(d,wpw){ const t=new Date(d); do{t.setUTCDate(t.getUTCDate()+1);}while(!werkdag(t,wpw)); return t; }

/* ---------- planning-engine (cascade) ---------- */
function werkdagAct(d, afd, a){
  // Zondag is standaard geen werkdag; alleen als hij expliciet is aangezet (plusdagen).
  if(d.getUTCDay()===0) return (a.plusdagen||[]).indexOf(iso(d))>-1;
  if(!werkdag(d, afd.werkdagen)) return false;
  const sk=a.skipdagen||[];
  return sk.indexOf(iso(d))===-1;
}
function planAfdeling(afd){
  const acts=S.data.activiteiten.filter(a=>a.afdeling_id===afd.id).sort((a,b)=>a.sort-b.sort);
  let cur = afd.startdatum ? pd(afd.startdatum) : null;
  const rows=[];
  for(const a of acts){
    if(a.status==='nvt'){ rows.push({a,start:null,eind:null}); continue; }
    if(a.handmatige_start) cur = pd(a.handmatige_start);
    if(!cur){ rows.push({a,start:null,eind:null}); continue; }
    let s=new Date(cur); while(!werkdagAct(s,afd,a)) s.setUTCDate(s.getUTCDate()+1);
    if(a.duur==null){ rows.push({a,start:s,eind:null}); cur=null; continue; }
    if(a.duur<=0){ rows.push({a,start:s,eind:s}); cur=s; continue; }
    let e=new Date(s), n=1;
    while(n<a.duur){ do{ e.setUTCDate(e.getUTCDate()+1); }while(!werkdagAct(e,afd,a)); n++; }
    rows.push({a,start:s,eind:e});
    cur=volgendeWerkdag(e,afd.werkdagen);
  }
  return rows;
}

/* ---------- api ---------- */
async function api(body){
  const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify(Object.assign({code:S.code,wie:S.wie},body))});
  if(r.status===401) throw {auth:true};
  if(!r.ok){ let m='serverfout'; try{ const j=await r.json(); if(j&&j.fout) m=j.fout; }catch(x){} throw new Error(m); }
  return r.json();
}
async function laad(){ const j=await api({action:'state'}); S.data=j; }
async function doe(actie, logtekst){
  try{ await api(Object.assign({},actie,{log:logtekst||''})); await laad(); render(); }
  catch(e){ toast(e.auth?'Niet ingelogd':(e.message&&e.message!=='serverfout'?e.message:'Opslaan mislukt — check je verbinding')); }
}
function toast(t){ const el=document.getElementById('toast'); el.textContent=t; el.classList.add('zien');
  setTimeout(()=>el.classList.remove('zien'),2600); }

function maakFoto(meta, logtekst){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*';
  inp.onchange=()=>{
    const file=inp.files&&inp.files[0]; if(!file) return;
    const img=new Image();
    img.onload=()=>{
      const max=1400; let w=img.width,h=img.height;
      if(w>max||h>max){ const sc=max/Math.max(w,h); w=Math.round(w*sc); h=Math.round(h*sc); }
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      const b64=c.toDataURL('image/jpeg',0.8);
      toast('Foto uploaden…');
      doe({action:'foto_add',b64:b64,fields:Object.assign({door:S.wie,datum:vandaagISO()},meta)}, logtekst||'Foto toegevoegd');
    };
    img.onerror=()=>toast('Kon foto niet lezen');
    img.src=URL.createObjectURL(file);
  };
  inp.click();
}

function levHoortBij(l, afd){
  const loc=S.data.locaties.find(x=>x.id===afd.locatie_id);
  const t=(l.afdeling_tekst||'').toLowerCase();
  return t.includes(afd.code.toLowerCase())&&t.includes(loc.code.split('/')[0].toLowerCase().slice(0,2));
}

  const dag=pd(S.dag);

  let h='<div class="dagnav"><button id="d-vorig">‹</button><div class="datum">'+fmtLang(dag)+(S.dag===vandaagISO()?' (vandaag)':'')+'</div><button id="d-volgend">›</button><button id="d-nu" style="font-size:12px">vandaag</button></div>';

  if(scopeAfdIds) levs=levs.filter(l=>S.data.afdelingen.some(a=>scopeAfdIds.has(a.id)&&levHoortBij(l,a)));
  h+='<div class="kaart"><h2>📦 Leveringen</h2>';
  h+=levs.length?levs.map(levRegel).join(''):'<div class="leeg">Geen leveringen op deze dag.</div>';
  h+='</div>';
  h+='<div class="kaart"><h2>🔨 Aan het werk</h2>';
  let iets=false;
  for(const afd of S.data.afdelingen.filter(a=>a.actief&&(!scopeAfdIds||scopeAfdIds.has(a.id)))){
    for(const r of planAfdeling(afd)){
      if(!r.start||!r.eind) continue;
      if(dag>=r.start&&dag<=r.eind&&r.a.status!=='nvt'){
        iets=true;
        const bv=bedrijfVan(afd,r.a);

  if(dagFotos.length) h+='<div class="kaart"><h2>📷 Foto&#39;s van deze dag</h2>'+fotoThumbs(dagFotos,false)+'</div>';

  app.innerHTML=h;
  document.getElementById('d-vorig').onclick=()=>{const d=pd(S.dag);d.setUTCDate(d.getUTCDate()-1);S.dag=iso(d);render();};
  document.getElementById('d-volgend').onclick=()=>{const d=pd(S.dag);d.setUTCDate(d.getUTCDate()+1);S.dag=iso(d);render();};
  document.getElementById('d-nu').onclick=()=>{S.dag=vandaagISO();render();};
  const ni=document.getElementById('naar-inbox'); if(ni) ni.onclick=e=>{e.preventDefault();S.view='inbox';render();};
  const hb=document.getElementById('v-heelblok'); if(hb) hb.onclick=e=>{e.preventDefault();S.dagBlok=null;render();};
  koppelStatus(app); koppelLev(app); koppelTaken(app);
}
function statusKnop(a){
  const lbl={todo:'te doen',bezig:'bezig',klaar:'✓ klaar',nvt:'n.v.t.'}[a.status]||a.status;
  return '<button class="statusknop '+a.status+'" data-act="'+a.id+'">'+lbl+'</button>';
}
function koppelStatus(root){
  root.querySelectorAll('.statusknop[data-act]').forEach(b=>b.onclick=()=>{
    const a=S.data.activiteiten.find(x=>x.id===+b.dataset.act);
    const volg={todo:'bezig',bezig:'klaar',klaar:'todo',nvt:'todo'}[a.status];
    const afd=S.data.afdelingen.find(x=>x.id===a.afdeling_id);
    doe({action:'act_update',id:a.id,fields:{status:volg}}, afdNaam(afd)+' — "'+a.naam+'" → '+volg);
  });
}
function levRegel(l){
  const nm=levBedrijfNaam(l);
  return '<div class="regel"><input type="checkbox" data-lev="'+l.id+'" '+(l.ontvangen?'checked':'')+'>'
    +'<span style="flex:1">'+bedrijfDot(nm)+'<b>'+esc(nm)+'</b> <span class="chip" style="background:'+(MAT_KLEUR[l.materiaal]||'#6c757d')+'">'+esc(l.materiaal)+'</span>'
    +'<br><span class="stil">'+esc(l.afdeling_tekst||'')+(l.omschrijving?' · '+esc(l.omschrijving):'')+'</span></span>'
    +'<span class="stil">'+fmt(pd(l.datum))+'</span></div>';
}
function koppelLev(root){
  root.querySelectorAll('input[data-lev]').forEach(c=>c.onchange=()=>{
    const l=S.data.leveringen.find(x=>x.id===+c.dataset.lev);
    doe({action:'lev_update',id:l.id,fields:{ontvangen:c.checked}}, 'Levering '+levBedrijfNaam(l)+' ('+(l.datum||'').slice(0,10)+') '+(c.checked?'ontvangen ✓':'niet ontvangen'));
  });
}

/* ---- Week ---- */
function rWeek(app){
  const nuMa=maandagVan(pd(vandaagISO()));
  if(!S.wkStart) S.wkStart=iso(nuMa);
  if(!S.wkVenster){ const v=+(localStorage.getItem('rp_venster3')||3); S.wkVenster=(v>=3&&v<=13)?v:3; }
  if(S.kolBreedte==null){ const kb=+(localStorage.getItem('rp_kolbreedte')||0); S.kolBreedte=(kb>=120&&kb<=500)?kb:0; }
  const sel=pd(S.wkStart);
  const offset=Math.floor((S.wkVenster-1)/2);
  const start=new Date(sel); start.setUTCDate(start.getUTCDate()-7*offset);
  const weken=[]; for(let i=0;i<S.wkVenster;i++){ const d=new Date(start); d.setUTCDate(d.getUTCDate()+7*i); weken.push(d); }
  const dicht=dichtSet();
  const verborgen=filterSet();
  const plans={};
  for(const afd of S.data.afdelingen.filter(a=>a.actief&&!verborgen.has(a.id))) plans[afd.id]=planAfdeling(afd);
  const iwA=isoWeek(weken[0]), iwB=isoWeek(weken[weken.length-1]);
  const iwSel=isoWeek(sel);
  let h='<div class="dagnav"><button id="wk-vorig">‹</button><div class="datum">wk '+iwSel.week+' <span class="stil">'+fmt(sel)+(S.wkVenster>1?' · wk '+iwA.week+'–'+iwB.week+' in beeld':'')+'</span></div><button id="wk-volgend">›</button><button id="wk-nu" style="font-size:12px">deze week</button></div>';
  h+='<div style="display:flex;gap:10px;align-items:center;margin-bottom:8px;flex-wrap:wrap">'
    +'<label class="stil">weken in beeld:</label><button class="stap" id="wk-min">−</button><input type="range" id="wk-slider" min="3" max="13" step="1" value="'+S.wkVenster+'" style="width:120px;accent-color:var(--groen)"><button class="stap" id="wk-plus">+</button><b id="wk-slider-label" style="min-width:18px">'+S.wkVenster+'</b>'
    +'<button class="knop licht klein" id="wk-filter">🔍 Filter afdelingen</button>'
    +(verborgen.size?'<span class="stil">'+verborgen.size+' verborgen</span><button class="knop klein" id="wk-filter-wis">alles tonen</button>':'')
    +'</div>';
  h+='<div id="wg"><table><tr class="kop"><th class="naam">Afdeling</th>';
  for(const w of weken){ const iw=isoWeek(w);
    const isSel=w.getTime()===sel.getTime();
    const thStijl=isSel?' style="min-width:'+(S.kolBreedte||260)+'px"':' style="min-width:64px"';
    h+='<th data-week="'+iso(w)+'" title="klik om deze week te kiezen (komt in het midden)"'+thStijl+' class="'+(isSel?'wknu':(w.getTime()===nuMa.getTime()?'wkhuidig':''))+'">wk '+iw.week+'<br><span style="font-weight:400">'+w.getUTCDate()+'/'+(w.getUTCMonth()+1)+'</span><br><span class="dagknop" data-weekdag="'+iso(w)+'" title="dagplanning van deze week">dagen ›</span>'+(isSel?'<span class="kolgreep" title="sleep om de kolombreedte aan te passen; dubbelklik = automatisch"></span>':'')+'</th>'; }
  h+='</tr>';
  for(const loc of S.data.locaties.sort((a,b)=>a.sort-b.sort)){
    const locKey='loc-'+loc.id;
    const locDicht=dicht.has(locKey);
    const nAfd=S.data.afdelingen.filter(a=>a.locatie_id===loc.id&&a.actief&&!verborgen.has(a.id)).length;
    h+='<tr class="lockop"><td class="naam klap" data-klap="'+locKey+'" style="background:var(--groen);color:#fff">'+(locDicht?'▸ ':'▾ ')+esc(loc.code)+(locDicht?' ('+nAfd+')':'')+'</td><td colspan="'+weken.length+'"></td></tr>';
    if(locDicht) continue;
    const blokken=S.data.blokken.filter(b=>b.locatie_id===loc.id).sort((a,b)=>a.sort-b.sort).concat([null]);
    for(const blok of blokken){
      const afds=S.data.afdelingen.filter(a=>a.locatie_id===loc.id&&a.actief&&!verborgen.has(a.id)&&(blok?a.blok_id===blok.id:!a.blok_id)).sort((a,b)=>a.sort-b.sort);
      if(!afds.length) continue;
      const klapKey='blok-'+(blok?blok.id:'ov'+loc.id);
      const isDicht=dicht.has(klapKey);
      h+='<tr class="blokkop"><td class="naam klap" data-klap="'+klapKey+'">'+(isDicht?'▸ ':'▾ ')+esc(blok?blok.naam:'Overig')+(isDicht?' ('+afds.length+')':'')+'</td>'
        +'<td colspan="'+weken.length+'" style="padding:2px 6px">'+(blok?'<button class="dagknop" data-blokdag="'+blok.id+'">dagniveau ›</button>':'')+'</td></tr>';
      if(isDicht) continue;
      for(const afd of afds){
        h+='<tr><td class="naam" data-afd="'+afd.id+'">'+esc(isNaN(+afd.code)?afd.code:('afd '+afd.code))+'</td>';
        for(const w of weken){
          const we=new Date(w); we.setUTCDate(we.getUTCDate()+6);
          const levsWeek=S.data.leveringen.filter(l=>{ if(!l.datum)return false; const d=pd(l.datum);
            return d>=w&&d<=we&&levHoortBij(l,afd); });
          let segs='';
          if(w.getTime()===sel.getTime()){
            for(const r of plans[afd.id]){
              if(r.start&&r.eind&&r.start<=we&&r.eind>=w&&r.a.status!=='nvt'){
                const b=bedrijfVan(afd,r.a);
                segs+='<div class="wblok" style="border-left-color:'+kleur(r.a.naam)+';opacity:'+(r.a.status==='klaar'?0.45:1)+'">'+esc(r.a.naam)+(r.a.status==='klaar'?' ✓':'')
                  +(b?'<br><span class="stil">'+bedrijfDot(b.naam)+esc(b.naam)+'</span>':'')+'</div>';
              }
            }
            for(const l of levsWeek){
              segs+='<div class="wblok" style="border-left-color:'+(l.ontvangen?'#52b788':'#c1442e')+'">📦 '+fmt(pd(l.datum))+' · '+esc(levBedrijfNaam(l))+' · '+esc(l.materiaal)+(l.ontvangen?' ✓':'')+'</div>';
            }
            h+='<td><div class="wcel breed" data-afd="'+afd.id+'">'+segs+'</div></td>';
          } else {
            for(const r of plans[afd.id]){
              if(r.start&&r.eind&&r.start<=we&&r.eind>=w&&r.a.status!=='nvt')
                segs+='<div class="wseg" style="background:'+kleur(r.a.naam)+';opacity:'+(r.a.status==='klaar'?0.35:1)+'" title="'+esc(r.a.naam)+' '+fmt(r.start)+'–'+fmt(r.eind)+'"></div>';
            }
            const lev = levsWeek.length?'<span class="wlev '+(levsWeek.every(x=>x.ontvangen)?'ok':'')+'" title="'+esc(levsWeek.map(x=>levBedrijfNaam(x)+' '+x.materiaal).join(', '))+'"></span>':'';
            h+='<td><div class="wcel" data-afd="'+afd.id+'">'+segs+lev+'</div></td>';
          }
        }
        h+='</tr>';
      }
    }
  }
  h+='</table></div>';
  h+='<div class="legenda">'+actCats().map(c=>'<span><i style="background:'+c.kleur+'"></i>'+esc(c.naam)+'</span>').join('')
    +'<span><i style="background:var(--rood);border-radius:50%"></i>levering verwacht</span><span><i style="background:var(--groen-licht);border-radius:50%"></i>levering binnen</span></div>';
  app.innerHTML=h;
  document.getElementById('wk-vorig').onclick=()=>{const d=pd(S.wkStart);d.setUTCDate(d.getUTCDate()-7);S.wkStart=iso(d);render();};
  document.getElementById('wk-volgend').onclick=()=>{const d=pd(S.wkStart);d.setUTCDate(d.getUTCDate()+7);S.wkStart=iso(d);render();};
  document.getElementById('wk-nu').onclick=()=>{S.wkStart=iso(maandagVan(pd(vandaagISO())));render();};
  const sl=document.getElementById('wk-slider');
  sl.oninput=()=>{document.getElementById('wk-slider-label').textContent=sl.value;};
  sl.onchange=()=>{S.wkVenster=+sl.value;localStorage.setItem('rp_venster3',S.wkVenster);render();};
  const zetVenster=n=>{S.wkVenster=Math.min(13,Math.max(3,n));localStorage.setItem('rp_venster3',S.wkVenster);render();};
  document.getElementById('wk-min').onclick=()=>zetVenster(S.wkVenster-1);
  document.getElementById('wk-plus').onclick=()=>zetVenster(S.wkVenster+1);
  app.querySelectorAll('.kolgreep').forEach(g=>{
    g.onclick=e=>e.stopPropagation();
    g.ondblclick=e=>{e.stopPropagation();S.kolBreedte=0;localStorage.setItem('rp_kolbreedte',0);render();};
    g.onpointerdown=e=>{
      e.preventDefault(); e.stopPropagation();
      const startX=e.clientX;
      const startB=g.parentElement.getBoundingClientRect().width;
      const alleTh=Array.from(document.querySelectorAll('#wg th.wknu'));
      const beweeg=ev=>{
        const b=Math.min(500,Math.max(120,Math.round(startB+(ev.clientX-startX))));
        alleTh.forEach(t=>{t.style.minWidth=b+'px';t.style.width=b+'px';});
      };
      const los=ev=>{
        document.removeEventListener('pointermove',beweeg);
        document.removeEventListener('pointerup',los);
        const b=Math.min(500,Math.max(120,Math.round(startB+(ev.clientX-startX))));
        S.kolBreedte=b; localStorage.setItem('rp_kolbreedte',b); render();
      };
      document.addEventListener('pointermove',beweeg);
      document.addEventListener('pointerup',los);
    };
  });
  app.querySelectorAll('[data-afd]').forEach(el=>el.onclick=()=>{S.selAfd=+el.dataset.afd;S.afdTerug='week';S.agStart=S.wkStart;S.view='afdelingen';render();window.scrollTo(0,0);});
  app.querySelectorAll('[data-klap]').forEach(el=>el.onclick=()=>{dichtToggle(el.dataset.klap);render();});
  app.querySelectorAll('th[data-week]').forEach(el=>el.onclick=()=>{S.wkStart=el.dataset.week;render();});
  app.querySelectorAll('[data-weekdag]').forEach(el=>el.onclick=e=>{e.stopPropagation();S.weekStart=el.dataset.weekdag;S.weekBlok=null;S.view='weekdetail';render();window.scrollTo(0,0);});
  app.querySelectorAll('button[data-blokdag]').forEach(b=>b.onclick=()=>{
    S.weekBlok=+b.dataset.blokdag;
    S.weekStart=iso(maandagVan(pd(vandaagISO())));
    S.view='weekdetail'; render(); window.scrollTo(0,0);
  });
  document.getElementById('wk-filter').onclick=filterSheet;
  const fw=document.getElementById('wk-filter-wis'); if(fw) fw.onclick=()=>{filterWis();render();};
}

/* ---- Weekdetail: één week, afdelingen × dagen ---- */
function rWeekDetail(app){
  if(!S.weekStart) S.weekStart=iso(maandagVan(pd(vandaagISO())));
  const ma=pd(S.weekStart);
  const iw=isoWeek(ma);
  const dagen=[]; for(let i=0;i<7;i++){ const d=new Date(ma); d.setUTCDate(d.getUTCDate()+i); dagen.push(d); }
  const zo=dagen[6];
  const dicht=dichtSet();
  const verborgen=filterSet();
  const scopeBlok=S.weekBlok?(S.data.blokken||[]).find(b=>b.id===S.weekBlok):null;
  const plans={};
  for(const afd of S.data.afdelingen.filter(a=>a.actief&&!verborgen.has(a.id))) plans[afd.id]=planAfdeling(afd);
  const DG=['ma','di','wo','do','vr','za','zo'];
  let h='<div class="dagnav"><button id="w-vorig">‹</button><div class="datum">Week '+iw.week+' · '+fmt(ma)+' t/m '+fmt(zo)+'</div><button id="w-volgend">›</button><button id="w-terug" style="font-size:12px">weekoverzicht</button></div>';
  if(verborgen.size) h+='<div class="stil" style="margin-bottom:8px">🔍 Filter actief: '+verborgen.size+' afdelingen verborgen (aanpassen via Week › Filter)</div>';
  if(scopeBlok) h+='<div class="stil" style="margin-bottom:8px">Ingezoomd op blok "'+esc(scopeBlok.naam)+'" — <a href="#" id="w-heelweek">alle afdelingen tonen</a></div>';
  h+='<div id="wg"><table><tr class="kop"><th class="naam">Afdeling</th>';
  for(const d of dagen){ const dIso=iso(d);
    h+='<th data-dag="'+dIso+'" title="klik voor de dagweergave" style="min-width:150px" class="'+(dIso===vandaagISO()?'wknu':'')+'">'+DG[(d.getUTCDay()+6)%7]+'<br><span style="font-weight:400">'+d.getUTCDate()+'/'+(d.getUTCMonth()+1)+'</span></th>'; }
  h+='</tr>';
  for(const loc of S.data.locaties.sort((a,b)=>a.sort-b.sort)){
    if(scopeBlok&&loc.id!==scopeBlok.locatie_id) continue;
    const locKey='loc-'+loc.id;
    const locDicht=scopeBlok?false:dicht.has(locKey);
    const nAfd=S.data.afdelingen.filter(a=>a.locatie_id===loc.id&&a.actief&&!verborgen.has(a.id)).length;
    h+='<tr class="lockop"><td class="naam klap" data-klap="'+locKey+'" style="background:var(--groen);color:#fff">'+(locDicht?'▸ ':'▾ ')+esc(loc.code)+(locDicht?' ('+nAfd+')':'')+'</td><td colspan="7"></td></tr>';
    if(locDicht) continue;
    const blokken=S.data.blokken.filter(b=>b.locatie_id===loc.id).sort((a,b)=>a.sort-b.sort).concat([null]);
    for(const blok of blokken){
      if(scopeBlok&&(!blok||blok.id!==scopeBlok.id)) continue;
      const afds=S.data.afdelingen.filter(a=>a.locatie_id===loc.id&&a.actief&&!verborgen.has(a.id)&&(blok?a.blok_id===blok.id:!a.blok_id)).sort((a,b)=>a.sort-b.sort);
      if(!afds.length) continue;
      const klapKey='blok-'+(blok?blok.id:'ov'+loc.id);
      const isDicht=scopeBlok?false:dicht.has(klapKey);
      h+='<tr class="blokkop"><td class="naam klap" data-klap="'+klapKey+'">'+(isDicht?'▸ ':'▾ ')+esc(blok?blok.naam:'Overig')+(isDicht?' ('+afds.length+')':'')+'</td><td colspan="7"></td></tr>';
      if(isDicht) continue;
      for(const afd of afds){
        h+='<tr><td class="naam" data-afd="'+afd.id+'">'+esc(isNaN(+afd.code)?afd.code:('afd '+afd.code))+'</td>';
        for(const d of dagen){
          const dIso=iso(d);
          let segs='';
          for(const r of plans[afd.id]){
            if(r.start&&r.eind&&d>=r.start&&d<=r.eind&&r.a.status!=='nvt'){
              const bv=bedrijfVan(afd,r.a);
              segs+='<div class="wblok" style="border-left-color:'+kleur(r.a.naam)+';opacity:'+(r.a.status==='klaar'?0.5:1)+'">'+esc(r.a.naam)+(r.a.status==='klaar'?' ✓':'')
                +(bv?'<br><span class="stil">'+bedrijfDot(bv.naam)+esc(bv.naam)+'</span>':'')+'</div>';
            }
          }
          const levs=S.data.leveringen.filter(l=>{ if(!l.datum||l.datum.slice(0,10)!==dIso) return false;
            return (l.afdeling_tekst||'').toLowerCase().includes(afd.code.toLowerCase())&&(l.afdeling_tekst||'').toLowerCase().includes(loc.code.split('/')[0].toLowerCase().slice(0,2)); });
          for(const l of levs) segs+='<div class="wblok" style="border-left-color:'+(l.ontvangen?'#52b788':'#c1442e')+'">📦 '+esc(levBedrijfNaam(l))+' · '+esc(l.materiaal)+(l.ontvangen?' ✓':'')+'</div>';
          h+='<td><div class="wcel breed" data-afd="'+afd.id+'">'+segs+'</div></td>';
        }
        h+='</tr>';
      }
    }
  }
  h+='</table></div>';
  h+='<div class="legenda">'+actCats().map(c=>'<span><i style="background:'+c.kleur+'"></i>'+esc(c.naam)+'</span>').join('')
    +'<span><i style="background:var(--rood);border-radius:50%"></i>levering verwacht</span><span><i style="background:var(--groen-licht);border-radius:50%"></i>levering binnen</span></div>';
  h+='<div class="stil" style="margin-top:4px">Tik op een dagkop voor de volledige dagweergave (leveringen, werk en taken van die dag).</div>';
  app.innerHTML=h;
  document.getElementById('w-vorig').onclick=()=>{const d=pd(S.weekStart);d.setUTCDate(d.getUTCDate()-7);S.weekStart=iso(d);render();};
  document.getElementById('w-volgend').onclick=()=>{const d=pd(S.weekStart);d.setUTCDate(d.getUTCDate()+7);S.weekStart=iso(d);render();};
  document.getElementById('w-terug').onclick=()=>{S.weekBlok=null;S.view='week';render();};
  const hw=document.getElementById('w-heelweek'); if(hw) hw.onclick=e=>{e.preventDefault();S.weekBlok=null;render();};
  app.querySelectorAll('th[data-dag]').forEach(el=>el.onclick=()=>{S.dag=el.dataset.dag;S.dagBlok=S.weekBlok;S.view='vandaag';render();window.scrollTo(0,0);});
  app.querySelectorAll('[data-afd]').forEach(el=>el.onclick=()=>{S.selAfd=+el.dataset.afd;S.afdTerug='week';S.agStart=S.weekStart;S.view='afdelingen';render();window.scrollTo(0,0);});
  app.querySelectorAll('[data-klap]').forEach(el=>el.onclick=()=>{dichtToggle(el.dataset.klap);render();});
}

/* ---- Afdelingen lijst ---- */
function rAfdLijst(app){
  const dicht=dichtSet();
  let h='';
  for(const loc of S.data.locaties.sort((a,b)=>a.sort-b.sort)){
    const locKey='loc-'+loc.id;
    const locDicht=dicht.has(locKey);
    h+='<div class="kaart"><h2 class="klap" data-klap="'+locKey+'">'+(locDicht?'▸ ':'▾ ')+esc(loc.code)+' — '+esc(loc.naam)
      +(locDicht?' <span class="stil">('+S.data.afdelingen.filter(a=>a.locatie_id===loc.id).length+' afdelingen)</span>':'')+'</h2>';
    if(locDicht){ h+='</div>'; continue; }
    const blokken=S.data.blokken.filter(b=>b.locatie_id===loc.id).sort((a,b)=>a.sort-b.sort).concat([null]);
    for(const blok of blokken){
      const afds=S.data.afdelingen.filter(a=>a.locatie_id===loc.id&&(blok?a.blok_id===blok.id:!a.blok_id)).sort((a,b)=>a.sort-b.sort);
      if(!afds.length) continue;
      const klapKey='blok-'+(blok?blok.id:'ov'+loc.id);
      const isDicht=dicht.has(klapKey);
      h+='<h3 class="klap" data-klap="'+klapKey+'">'+(isDicht?'▸ ':'▾ ')+esc(blok?blok.naam:'Overig')+(isDicht?' <span class="stil">('+afds.length+' afdelingen)</span>':'')+'</h3>';
      if(isDicht) continue;
      for(const afd of afds){
        const rows=planAfdeling(afd);
        const totaal=rows.filter(r=>r.a.status!=='nvt').length;
        const klaar=rows.filter(r=>r.a.status==='klaar').length;
        const volgende=rows.find(r=>r.a.status==='todo'||r.a.status==='bezig');
        h+='<div class="regel" data-afd="'+afd.id+'" style="cursor:pointer;'+(afd.actief?'':'opacity:.45')+'">'
          +'<b style="min-width:56px">'+esc(isNaN(+afd.code)?afd.code:('afd '+afd.code))+'</b>'
          +'<span style="flex:1" class="stil">'+(afd.actief? (volgende? esc(volgende.a.naam)+' · '+fmt(volgende.start) : (klaar===totaal&&totaal>0?'✅ gereed':'—')) :'inactief')+'</span>'
          +'<span class="stil">'+klaar+'/'+totaal+'</span><span style="color:var(--grijs)">›</span></div>';
      }
    }
    h+='</div>';
  }
  app.innerHTML=h;
  app.querySelectorAll('[data-afd]').forEach(el=>el.onclick=()=>{S.selAfd=+el.dataset.afd;S.afdTerug='lijst';render();window.scrollTo(0,0);});
  app.querySelectorAll('[data-klap]').forEach(el=>el.onclick=()=>{dichtToggle(el.dataset.klap);render();});
}

/* ---- Afdeling detail ---- */
function rAfdDetail(app){
  const afd=S.data.afdelingen.find(a=>a.id===S.selAfd);
  if(!afd){S.selAfd=null;return rAfdLijst(app);}
  const rows=planAfdeling(afd);
  const vandaag=vandaagISO();
  const terugWeek=S.afdTerug==='week';
  const volgorde=[];
  for(const loc of S.data.locaties.slice().sort((a,b)=>a.sort-b.sort)){
    for(const blok of S.data.blokken.filter(b=>b.locatie_id===loc.id).sort((a,b)=>a.sort-b.sort).concat([null])){
      for(const a of S.data.afdelingen.filter(x=>x.locatie_id===loc.id&&(blok?x.blok_id===blok.id:!x.blok_id)).sort((a,b)=>a.sort-b.sort)) volgorde.push(a.id);
    }
  }
  const vIdx=volgorde.indexOf(afd.id);
  let h='<a class="terug" href="#" id="terug">'+(terugWeek?'‹ Weekoverzicht':'‹ Alle afdelingen')+'</a>';
  h+='<div class="kaart"><div class="afdkop">'
    +'<button class="pijl" id="afd-vorig" title="vorige afdeling" '+(vIdx<=0?'disabled style="opacity:.3"':'')+'>‹</button>'
    +'<span class="titel">'+esc(afdNaam(afd))+'</span>'
    +'<button class="pijl" id="afd-volgend" title="volgende afdeling" '+(vIdx>=volgorde.length-1?'disabled style="opacity:.3"':'')+'>›</button>'
    +'<label style="margin-left:auto;font-size:13px"><input type="checkbox" id="afd-actief" '+(afd.actief?'checked':'')+'> actief</label></div>';
  h+='<div class="instelrij"><label>Start</label><input type="date" id="afd-start" value="'+(afd.startdatum?afd.startdatum.slice(0,10):'')+'">'
    +'<label>Notitie</label><input type="text" id="afd-notitie" style="flex:1;min-width:140px" value="'+esc(afd.notitie)+'"></div>';
  h+='<div class="instelrij"><label>Locatie</label><button class="knop licht klein" id="afd-verplaats">'+esc(afdPlek(afd))+' &#8250;</button></div>';
  h+='</div>';
  if(!S.agStart) S.agStart=iso(maandagVan(pd(vandaag)));
  const agStart=pd(S.agStart);
  const dagen=[]; for(let i=0;i<14;i++){ const d=new Date(agStart); d.setUTCDate(d.getUTCDate()+i); dagen.push(d); }
  const DG=['ma','di','wo','do','vr','za','zo'];
  h+='<div class="kaart"><h2>📅 Agenda per dag</h2>'
    +'<div class="dagnav"><button id="ag-vorig">‹</button><div class="datum">'+fmt(dagen[0])+' t/m '+fmt(dagen[13])+'</div><button id="ag-volgend">›</button><button id="ag-nu" style="font-size:12px">vandaag</button></div>';
  h+='<div id="wg"><table><tr class="kop"><th class="naam">Activiteit</th>';
  for(const d of dagen){ const dIso=iso(d);
    h+='<th class="'+(dIso===vandaag?'wknu':'')+'">'+DG[(d.getUTCDay()+6)%7]+'<br><span style="font-weight:400">'+d.getUTCDate()+'/'+(d.getUTCMonth()+1)+'</span></th>'; }
  h+='</tr>';
  const afdLevs=S.data.leveringen.filter(l=>l.datum&&levHoortBij(l,afd));
  if(afdLevs.length){
    h+='<tr><td class="naam">📦 Leveringen</td>';
    for(const d of dagen){ const dIso=iso(d);
      const dl=afdLevs.filter(l=>l.datum.slice(0,10)===dIso);
      h+='<td><div class="agcel">'+dl.map(l=>'<span class="aglev'+(l.ontvangen?' ok':'')+'" title="'+esc(levBedrijfNaam(l)+' · '+l.materiaal)+'">📦</span>').join('')+'</div></td>'; }
    h+='</tr>';
  }
  let ietsGepland=false;
  for(const r of rows){
    if(r.a.status==='nvt') continue;
    const b=bedrijfVan(afd,r.a);
    if(r.start) ietsGepland=true;
    h+='<tr><td class="naam agklik" data-agact="'+r.a.id+'">'+esc(r.a.naam)+(b?'<br><span class="stil">'+bedrijfDot(b.naam)+esc(b.naam)+'</span>':'')+'</td>';
    for(const d of dagen){
      const dIso=iso(d);
      let cel='';
      if(r.start&&r.eind&&d>=r.start&&d<=r.eind){
        if(werkdagAct(d,afd,r.a)){
          const toekomst=dIso>vandaag;
          cel='<div class="agbalk'+(S.gewijzigd&&S.gewijzigd.has(r.a.id)?' agnieuw':'')+'" data-agact="'+r.a.id+'" title="'+esc(r.a.naam)+' · '+fmt(r.start)+' t/m '+fmt(r.eind)+'" style="background:'+kleur(r.a.naam)+';opacity:'+(r.a.status==='klaar'?0.3:(toekomst?0.45:1))+'"></div>';
        } else {
          cel='<div class="agskip" data-agact="'+r.a.id+'" title="vrije dag (tik om aan te passen)"></div>';
        }
      } else if(r.start&&!r.eind&&iso(r.start)===dIso){
        cel='<div class="agbalk" data-agact="'+r.a.id+'" title="start bekend, duur nog invullen" style="background:'+kleur(r.a.naam)+';opacity:.45;border:1px dashed #666"></div>';
      }
      if(r.start&&r.eind&&dIso===iso(r.eind)) cel+='<span class="aggreep" data-greep="'+r.a.id+'" title="sleep naar links of rechts om korter of langer te maken"><i></i></span>';
      h+='<td><div class="agcel"'+(cel?'':' data-agdag="'+r.a.id+'|'+dIso+'" title="tik om deze activiteit hier te laten beginnen"')+'>'+cel+'</div></td>';
    }
    h+='</tr>';
  }
  h+='</table></div>';
  h+='<div class="stil" style="margin-top:4px">'+(ietsGepland
    ?'Vol = gedaan/bezig, licht = gepland, arcering = vrije dag. Sleep het greepje aan het einde van een balk naar links of rechts om korter of langer te maken; tik op een balk voor alle details.'
    :'Nog niets ingepland: zet hierboven een startdatum en geef hieronder per activiteit de werkdagen op — de agenda vult zich dan vanzelf.')+'</div></div>';
  h+='<div class="kaart"><h2>Activiteiten (volgorde = planning)</h2>';
  rows.forEach((r,i)=>{
    const a=r.a;
    h+='<div class="actrij">'
      +'<div style="display:flex;flex-direction:column;gap:2px"><button class="pijl" data-op="up" data-id="'+a.id+'" '+(i===0?'disabled style="opacity:.3"':'')+'>▲</button>'
      +'<button class="pijl" data-op="down" data-id="'+a.id+'" '+(i===rows.length-1?'disabled style="opacity:.3"':'')+'>▼</button></div>'
      +'<span class="chip" style="background:'+kleur(a.naam)+';width:10px;height:26px;padding:0;border-radius:4px"></span>'
      +'<div class="nm'+(S.gewijzigd&&S.gewijzigd.has(a.id)?' agnieuw':'')+'" data-open="'+a.id+'" style="cursor:pointer"><div class="naam">'+esc(a.naam)+(S.gewijzigd&&S.gewijzigd.has(a.id)?' <span class="deadline-oud">⇢ opgeschoven</span>':'')+'</div>'
      +'<div class="datums">'+(a.status==='nvt'?'n.v.t.':(r.start?fmt(r.start)+(r.eind?' t/m '+fmt(r.eind):' · duur nog invullen'):'nog niet gepland'))
      +(a.handmatige_start?' · 📌 vast op '+fmt(pd(a.handmatige_start)):'')
      +((a.skipdagen&&a.skipdagen.length)?' · '+a.skipdagen.length+' vrije dag(en)':'')
      +(function(){const b=bedrijfVan(afd,a); return b?' · '+bedrijfDot(b.naam)+esc(b.naam)+(b.afwijkend?' •':''):'';})()
      +(a.notitie?' · &#8618; '+esc(a.notitie):'')+'</div></div>'
      +'<span class="stepper"><button class="stap" data-min="'+a.id+'">−</button><input type="number" min="0" max="99" data-duur="'+a.id+'" value="'+(a.duur==null?'':a.duur)+'" placeholder="dgn" title="werkdagen"><button class="stap" data-plus="'+a.id+'">+</button></span>'
      +statusKnop(a)
      +'<button class="pijl" data-op="meer" data-id="'+a.id+'">›</button>'
      +'</div>';
  });
  const inAfd=new Set(rows.map(r=>r.a.naam));
  const beschikbaar=actCats().filter(c=>!inAfd.has(c.naam));
  h+='<div style="margin-top:10px"><div class="stil" style="margin-bottom:4px">Activiteit toevoegen (tik):</div>'
    +(beschikbaar.length?'<div class="keuze">'+beschikbaar.map(c=>'<button data-actcat="'+c.id+'"><i class="ldot" style="background:'+c.kleur+'"></i> '+esc(c.naam)+'</button>').join('')+'</div>':'')
    +'<div style="display:flex;gap:8px;margin-top:8px"><input type="text" id="nieuw-act" placeholder="of een nieuwe activiteit…" style="flex:1"><button class="knop klein" id="nieuw-act-knop">+ aanmaken</button></div>'
    +'<div class="stil" style="margin-top:4px">Een nieuwe activiteit krijgt automatisch een eigen kleur en verschijnt overal (weekoverzicht, voortgang, bedrijven per activiteit).</div></div>';
  h+='<div style="margin-top:10px"><button class="knop licht" id="afd-kopieer">&#10697; Werkdagen overnemen van een andere afdeling&hellip;</button></div>';
  h+='</div>';
  const afdFotos=(S.data.fotos||[]).filter(f=>f.afdeling_id===afd.id).slice(0,12);
  h+='<div class="kaart"><h2>📷 Foto&#39;s</h2>'+(afdFotos.length?fotoThumbs(afdFotos,true):'<div class="leeg">Nog geen foto&#39;s bij deze afdeling.</div>')
    +'<div style="margin-top:8px"><button class="knop licht" id="afd-foto">📷 Foto toevoegen</button></div></div>';
  app.innerHTML=h;
  document.getElementById('afd-foto').onclick=()=>maakFoto({afdeling_id:afd.id}, 'Foto bij '+afdNaam(afd));
  koppelFotoDel(app);
  document.getElementById('terug').onclick=e=>{e.preventDefault();S.selAfd=null;S.gewijzigd=null;if(terugWeek){S.view='week';}render();};
  document.getElementById('ag-vorig').onclick=()=>{const d=pd(S.agStart);d.setUTCDate(d.getUTCDate()-14);S.agStart=iso(d);render();};
  document.getElementById('ag-volgend').onclick=()=>{const d=pd(S.agStart);d.setUTCDate(d.getUTCDate()+14);S.agStart=iso(d);render();};
  document.getElementById('ag-nu').onclick=()=>{S.agStart=iso(maandagVan(pd(vandaagISO())));render();};
  app.querySelectorAll('[data-agact]').forEach(el=>el.onclick=()=>actKaart(afd.id,+el.dataset.agact));
  app.querySelectorAll('[data-open]').forEach(el=>el.onclick=()=>actKaart(afd.id,+el.dataset.open));
  app.querySelectorAll('.agcel[data-agdag]').forEach(el=>el.onclick=async()=>{
    const p=el.dataset.agdag.split('|');
    const act=S.data.activiteiten.find(x=>x.id===+p[0]);
    try{
      await api({action:'act_update',id:+p[0],fields:{handmatige_start:p[1]},log:afdNaam(afd)+' — "'+(act?act.naam:'?')+'" start → '+p[1]});
      await laad();
    }catch(e){ toast(e.message||'Opslaan mislukt'); return; }
    actKaart(afd.id,+p[0]);
  });
  const navAfd=n=>{ S.selAfd=volgorde[vIdx+n]; S.gewijzigd=null; render(); window.scrollTo(0,0); };
  if(vIdx>0) document.getElementById('afd-vorig').onclick=()=>navAfd(-1);
  if(vIdx<volgorde.length-1) document.getElementById('afd-volgend').onclick=()=>navAfd(1);
  app.querySelectorAll('.aggreep').forEach(g=>{
    g.onclick=e=>e.stopPropagation();
    g.onpointerdown=e=>{
      e.preventDefault(); e.stopPropagation();
      const actId=+g.dataset.greep;
      const r=rows.find(x=>x.a.id===actId);
      if(!r||!r.start||!r.eind) return;
      const cellen=Array.from(g.closest('tr').querySelectorAll('td')).slice(1).map(td=>td.querySelector('.agcel'));
      let doel=-1;
      const vindKol=x=>{
        for(let i=0;i<cellen.length;i++){ const b=cellen[i].getBoundingClientRect(); if(x>=b.left&&x<=b.right) return i; }
        return -1;
      };
      const teken=()=>cellen.forEach((c,i)=>c.classList.toggle('agdoel', doel>=0&&dagen[i]>=r.start&&i<=doel));
      const beweeg=ev=>{ const i=vindKol(ev.clientX); if(i>=0&&dagen[i]>=r.start){ doel=i; teken(); } };
      const los=()=>{
        document.removeEventListener('pointermove',beweeg);
        document.removeEventListener('pointerup',los);
        cellen.forEach(c=>c.classList.remove('agdoel'));
        if(doel<0) return;
        const nieuwEind=dagen[doel];
        let n=0;
        for(let d=new Date(r.start); d<=nieuwEind; d.setUTCDate(d.getUTCDate()+1)) if(werkdagAct(d,afd,r.a)) n++;
        if(n<1) n=1;
        if(n===r.a.duur) return;
        doe({action:'act_update',id:actId,fields:{duur:n}}, afdNaam(afd)+' — "'+r.a.naam+'" duur → '+n+' wd (gesleept)');
      };
      document.addEventListener('pointermove',beweeg);
      document.addEventListener('pointerup',los);
    };
  });
  document.getElementById('afd-actief').onchange=e=>doe({action:'afd_update',id:afd.id,fields:{actief:e.target.checked}}, afdNaam(afd)+' '+(e.target.checked?'geactiveerd':'op inactief gezet'));
  document.getElementById('afd-start').onchange=e=>doe({action:'afd_update',id:afd.id,fields:{startdatum:e.target.value||null}}, afdNaam(afd)+' startdatum → '+(e.target.value||'leeg'));
  document.getElementById('afd-notitie').onchange=e=>doe({action:'afd_update',id:afd.id,fields:{notitie:e.target.value}});
  app.querySelectorAll('input[data-duur]').forEach(inp=>inp.onchange=()=>{
    const a=S.data.activiteiten.find(x=>x.id===+inp.dataset.duur);
    const v=inp.value===''?null:Math.max(0,+inp.value);
    doe({action:'act_update',id:a.id,fields:{duur:v}}, afdNaam(afd)+' — "'+a.naam+'" duur → '+(v==null?'leeg':v+' wd'));
  });
  app.querySelectorAll('button[data-plus]').forEach(b=>b.onclick=()=>{
    const a=S.data.activiteiten.find(x=>x.id===+b.dataset.plus);
    const v=(a.duur==null?0:a.duur)+1;
    doe({action:'act_update',id:a.id,fields:{duur:v}}, afdNaam(afd)+' — "'+a.naam+'" duur → '+v+' wd');
  });
  app.querySelectorAll('button[data-min]').forEach(b=>b.onclick=()=>{
    const a=S.data.activiteiten.find(x=>x.id===+b.dataset.min);
    if(a.duur==null) return;
    const v=a.duur<=0?null:a.duur-1;
    doe({action:'act_update',id:a.id,fields:{duur:v}}, afdNaam(afd)+' — "'+a.naam+'" duur → '+(v==null?'leeg':v+' wd'));
  });
  koppelStatus(app);
  app.querySelectorAll('button[data-op]').forEach(b=>b.onclick=()=>{
    const id=+b.dataset.id, op=b.dataset.op;
    const acts=S.data.activiteiten.filter(x=>x.afdeling_id===afd.id).sort((x,y)=>x.sort-y.sort);
    const i=acts.findIndex(x=>x.id===id);
    if(op==='up'&&i>0){ const ids=acts.map(x=>x.id); [ids[i-1],ids[i]]=[ids[i],ids[i-1]];
      doe({action:'act_reorder',afdeling_id:afd.id,ids}, afdNaam(afd)+' volgorde gewijzigd'); }
    else if(op==='down'&&i<acts.length-1){ const ids=acts.map(x=>x.id); [ids[i+1],ids[i]]=[ids[i],ids[i+1]];
      doe({action:'act_reorder',afdeling_id:afd.id,ids}, afdNaam(afd)+' volgorde gewijzigd'); }
    else if(op==='meer'){ actKaart(afd.id,id); }
  });
  app.querySelectorAll('button[data-actcat]').forEach(b=>b.onclick=()=>{
    const c=actCats().find(x=>x.id===+b.dataset.actcat);
    doe({action:'act_add',afdeling_id:afd.id,naam:c.naam}, afdNaam(afd)+' — activiteit "'+c.naam+'" toegevoegd');
  });
  document.getElementById('nieuw-act-knop').onclick=async()=>{
    const v=document.getElementById('nieuw-act').value.trim();
    if(!v) return;
    try{ await api({action:'actcat_add',naam:v,log:'Nieuwe activiteit aangemaakt: '+v}); }
    catch(e){ toast('Aanmaken mislukt'); return; }
    doe({action:'act_add',afdeling_id:afd.id,naam:v}, afdNaam(afd)+' — activiteit "'+v+'" toegevoegd');
  };
  document.getElementById('afd-kopieer').onclick=()=>kopieerDuren(afd.id);
  document.getElementById('afd-verplaats').onclick=()=>verplaatsAfdeling(afd.id);
}

function afdPlek(afd){
  const loc=S.data.locaties.find(l=>l.id===afd.locatie_id);
  const blok=S.data.blokken.find(b=>b.id===afd.blok_id);
  return (loc?loc.code:'?')+(blok?' · '+blok.naam:'');
}

function verplaatsAfdeling(afdId){
  const sh=document.getElementById('sheet');
  const afd=S.data.afdelingen.find(a=>a.id===afdId);
  if(!afd) return;
  const dichtFn=()=>{sh.style.display='none';sh.innerHTML='';};
  let x='<div class="sheetkaart"><div class="sheettitel">📍 '+esc(afdNaam(afd))+' verplaatsen</div>'
    +'<div class="stil">Kies de groep waar deze afdeling voortaan onder valt. De planning, taken en foto&#39;s gaan gewoon mee.</div>';
  for(const loc of S.data.locaties.sort((a,b)=>a.sort-b.sort)){
    const blokken=S.data.blokken.filter(b=>b.locatie_id===loc.id).sort((a,b)=>a.sort-b.sort);
    if(!blokken.length) continue;
    x+='<div style="font-weight:600;font-size:13px;margin-top:4px">'+esc(loc.code)+'</div><div class="keuze">';
    for(const b of blokken) x+='<button data-vp="'+loc.id+'|'+b.id+'" class="'+(afd.blok_id===b.id?'aan':'')+'">'+esc(b.naam)+'</button>';
    x+='</div>';
  }
  x+='<button class="knop licht breed" id="vp-sluit">Annuleren</button></div>';
  sh.innerHTML=x; sh.style.display='flex';
  sh.onclick=e=>{ if(e.target===sh) dichtFn(); };
  document.getElementById('vp-sluit').onclick=dichtFn;
  sh.querySelectorAll('button[data-vp]').forEach(b=>b.onclick=()=>{
    const p=b.dataset.vp.split('|');
    const blok=S.data.blokken.find(x=>x.id===+p[1]);
    const loc=S.data.locaties.find(x=>x.id===+p[0]);
    dichtFn();
    doe({action:'afd_update',id:afdId,fields:{locatie_id:+p[0],blok_id:+p[1]}},
      afdNaam(afd)+' verplaatst naar '+loc.code+' · '+blok.naam);
  });
}
function actKaart(afdId, actId){
  const sh=document.getElementById('sheet');
  const dichtFn=()=>{sh.style.display='none';sh.innerHTML='';render();};
  let zekerDel=false;
  const maak=()=>{
    const afd=S.data.afdelingen.find(x=>x.id===afdId);
    const a=S.data.activiteiten.find(x=>x.id===actId);
    if(!afd||!a){ dichtFn(); return; }
    const rows=planAfdeling(afd);
    const r=rows.find(x=>x.a.id===actId);
    const gepland=!!(r&&r.start);
    let x='<div class="sheetkaart"><div class="sheettitel"><span class="chip" style="background:'+kleur(a.naam)+'">'+esc(a.naam)+'</span> '+esc(afdNaam(afd))+' '+statusKnop(a)+'</div>';
    const startWaarde=a.handmatige_start?a.handmatige_start.slice(0,10):(gepland?iso(r.start):'');
    x+='<div class="sheetrij"><label>Start</label><input type="date" id="ak-start" value="'+startWaarde+'">'
      +(a.handmatige_start
        ?'<span class="stil">📌 vast</span><button class="knop klein licht" id="ak-start-auto">maak automatisch</button>'
        :'<span class="stil">'+(gepland?'volgt automatisch — kies een datum om vast te zetten':'kies de startdatum')+'</span>')+'</div>';
    x+='<div class="sheetrij"><label>Werkdagen</label><span class="stepper"><button class="stap" id="dp-min">−</button><input type="number" id="dp-duur" min="0" max="99" value="'+(a.duur==null?'':a.duur)+'"><button class="stap" id="dp-plus">+</button></span>'
      +(gepland?'<label>Klaar op</label><input type="date" id="dp-eind" value="'+(r.eind?iso(r.eind):'')+'">':'')+'</div>';
    if(gepland){
      x+='<div class="stil">'+fmt(r.start)+' t/m '+(r.eind?fmt(r.eind):'?')+(a.duur!=null?' · '+a.duur+' werkdagen (ma t/m za)':' · duur nog invullen')
        +'<br>Tik een dag uit als er die dag niet gewerkt wordt. Zondag staat standaard uit — tik hem aan als er die zondag t&oacute;ch gewerkt wordt.</div>';
      if(r.eind&&a.duur){
        x+='<div class="keuze" style="max-height:32vh;overflow:auto">';
        for(let d=new Date(r.start); d<=r.eind; d.setUTCDate(d.getUTCDate()+1)){
          const dIso=iso(d);
          x+='<button data-dpdag="'+dIso+'" class="'+(werkdagAct(d,afd,a)?'aan':'')+'">'+fmt(d)+'</button>';
        }
        x+='</div>';
        if((a.skipdagen||[]).length) x+='<button class="knop klein licht" id="dp-wis">alle vrije dagen wissen</button>';
      }
    } else if(!startWaarde){
      x+='<div class="stil">Nog niet ingepland — kies hierboven een startdatum, of zet de startdatum van de afdeling.</div>';
    }
    x+='<div class="sheetrij"><label>🏢 Bedrijf</label><button class="knop licht klein" id="ak-bedrijf">'
      +(function(){const b=bedrijfVan(afd,a); return b? bedrijfDot(b.naam)+esc(b.naam)+(b.afwijkend?' (afwijkend)':' (standaard locatie)') : 'kiezen…';})()+' ✎</button></div>';
    x+='<div class="sheetrij"><button class="knop licht" id="ak-nvt">'+(a.status==='nvt'?'Weer actief maken':'Markeer als n.v.t.')+'</button>'
      +'<button class="knop rood" id="ak-del">'+(zekerDel?'Zeker weten? Tik nogmaals':'Verwijderen')+'</button></div>';
    x+='<button class="knop licht breed" id="dp-sluit">Klaar</button></div>';
    sh.innerHTML=x; sh.style.display='flex';
    sh.onclick=e=>{ if(e.target===sh) dichtFn(); };
    document.getElementById('dp-sluit').onclick=dichtFn;
    const update=async(fields,log)=>{
      const oud=planAfdeling(afd);
      try{
        await api({action:'act_update',id:actId,fields:fields,log:log});
        await laad();
        const nieuw=planAfdeling(S.data.afdelingen.find(x=>x.id===afdId));
        S.gewijzigd=new Set();
        for(const nr of nieuw){
          const or=oud.find(z=>z.a.id===nr.a.id);
          if(or&&nr.a.id!==actId&&or.start&&nr.start&&(iso(or.start)!==iso(nr.start)||String(or.eind&&iso(or.eind))!==String(nr.eind&&iso(nr.eind)))) S.gewijzigd.add(nr.a.id);
        }
        if(S.gewijzigd.size) toast('Let op: '+S.gewijzigd.size+' opvolgende activiteit(en) opgeschoven — check de nieuwe datums');
        maak();
      }catch(e){ toast(e.message||'Opslaan mislukt'); }
    };
    sh.querySelectorAll('.statusknop[data-act]').forEach(b=>b.onclick=()=>{
      const volg={todo:'bezig',bezig:'klaar',klaar:'todo',nvt:'todo'}[a.status];
      update({status:volg}, afdNaam(afd)+' — "'+a.naam+'" → '+volg);
    });
    sh.querySelectorAll('button[data-dpdag]').forEach(b=>b.onclick=()=>{
      const dIso=b.dataset.dpdag;
      if(pd(dIso).getUTCDay()===0){
        const pl=new Set(a.plusdagen||[]);
        const aanzetten=!pl.has(dIso);
        if(aanzetten) pl.add(dIso); else pl.delete(dIso);
        update({plusdagen:Array.from(pl).sort()}, afdNaam(afd)+' — "'+a.naam+'" zondag '+dIso+(aanzetten?' aangezet':' uitgezet'));
      } else {
        const sk=new Set(a.skipdagen||[]);
        if(sk.has(dIso)) sk.delete(dIso); else sk.add(dIso);
        update({skipdagen:Array.from(sk).sort()}, afdNaam(afd)+' — "'+a.naam+'" vrije dagen aangepast ('+sk.size+')');
      }
    });
    const wis=document.getElementById('dp-wis');
    if(wis) wis.onclick=()=>update({skipdagen:[]}, afdNaam(afd)+' — "'+a.naam+'" vrije dagen gewist');
    document.getElementById('dp-plus').onclick=()=>update({duur:(a.duur==null?0:a.duur)+1}, afdNaam(afd)+' — "'+a.naam+'" duur → '+((a.duur==null?0:a.duur)+1)+' wd');
    document.getElementById('dp-min').onclick=()=>{ if(a.duur!=null&&a.duur>0) update({duur:a.duur-1}, afdNaam(afd)+' — "'+a.naam+'" duur → '+(a.duur-1)+' wd'); };
    document.getElementById('dp-duur').onchange=e=>{
      const v=e.target.value===''?null:Math.max(0,+e.target.value);
      update({duur:v}, afdNaam(afd)+' — "'+a.naam+'" duur → '+(v==null?'leeg':v+' wd'));
    };
    const eindInp=document.getElementById('dp-eind');
    if(eindInp) eindInp.onchange=e=>{
      const eindIso=e.target.value;
      if(!eindIso) return;
      const eind=pd(eindIso);
      if(eind<r.start){ toast('Einddatum ligt vóór de start'); maak(); return; }
      let n=0;
      for(let d=new Date(r.start); d<=eind; d.setUTCDate(d.getUTCDate()+1)){ if(werkdagAct(d,afd,a)) n++; }
      if(n<1) n=1;
      update({duur:n}, afdNaam(afd)+' — "'+a.naam+'" klaar op '+eindIso+' → duur '+n+' wd');
    };
    document.getElementById('ak-bedrijf').onclick=()=>{
      bedrijfKiezer('Bedrijf voor "'+a.naam+'" — '+afdNaam(afd), a.bedrijf_id||null, bid=>{
        update({bedrijf_id:bid}, afdNaam(afd)+' — "'+a.naam+'" bedrijf → '+(bid?bedrijfNaam(bid):'standaard locatie'));
      });
    };
    document.getElementById('ak-start').onchange=e=>{
      const d=e.target.value;
      if(d) update({handmatige_start:d}, afdNaam(afd)+' — "'+a.naam+'" start → '+d);
      else if(a.handmatige_start) update({handmatige_start:null}, afdNaam(afd)+' — "'+a.naam+'" start weer automatisch');
    };
    const sa=document.getElementById('ak-start-auto');
    if(sa) sa.onclick=()=>update({handmatige_start:null}, afdNaam(afd)+' — "'+a.naam+'" start weer automatisch');
    document.getElementById('ak-nvt').onclick=()=>{
      const nieuw=a.status==='nvt'?'todo':'nvt';
      update({status:nieuw}, afdNaam(afd)+' — "'+a.naam+'" → '+nieuw);
    };
    document.getElementById('ak-del').onclick=()=>{
      if(!zekerDel){ zekerDel=true; maak(); return; }
      dichtFn(); doe({action:'act_delete',id:a.id}, afdNaam(afd)+' — activiteit "'+a.naam+'" verwijderd');
    };
  };
  maak();
}

function kopieerDuren(afdId){
  const sh=document.getElementById('sheet');
  const dichtFn=()=>{sh.style.display='none';sh.innerHTML='';};
  const doel=S.data.activiteiten.filter(z=>z.afdeling_id===afdId);
  let x='<div class="sheetkaart"><div class="sheettitel">&#10697; Werkdagen overnemen</div>'
    +'<div class="stil">Kies de afdeling waarvan je de werkdagen per activiteit wilt overnemen (het getal = hoeveel activiteiten matchen op naam). Vrije dagen, bedrijven en statussen gaan niet mee, en je kunt daarna alles gewoon per activiteit bijstellen.</div>';
  let opties=0;
  for(const loc of S.data.locaties.sort((a,b)=>a.sort-b.sort)){
    let rijen='';
    for(const bron of S.data.afdelingen.filter(z=>z.locatie_id===loc.id&&z.id!==afdId).sort((a,b)=>a.sort-b.sort)){
      const acts=S.data.activiteiten.filter(z=>z.afdeling_id===bron.id&&z.duur!=null);
      if(!acts.length) continue;
      const n=doel.filter(d=>acts.some(z=>z.naam===d.naam)).length;
      if(!n) continue;
      opties++;
      rijen+='<button data-kd="'+bron.id+'">'+esc(isNaN(+bron.code)?bron.code:('afd '+bron.code))+' <span class="stil">('+n+')</span></button>';
    }
    if(rijen) x+='<div style="font-weight:600;font-size:13px;margin-top:4px">'+esc(loc.code)+'</div><div class="keuze">'+rijen+'</div>';
  }
  if(!opties) x+='<div class="leeg">Geen andere afdeling heeft al werkdagen ingevuld.</div>';
  x+='<button class="knop licht breed" id="kd-sluit">Annuleren</button></div>';
  sh.innerHTML=x; sh.style.display='flex';
  sh.onclick=e=>{ if(e.target===sh) dichtFn(); };
  document.getElementById('kd-sluit').onclick=dichtFn;
  sh.querySelectorAll('button[data-kd]').forEach(b=>b.onclick=()=>{
    const bronAfd=S.data.afdelingen.find(z=>z.id===+b.dataset.kd);
    const acts=S.data.activiteiten.filter(z=>z.afdeling_id===bronAfd.id&&z.duur!=null);
    const n=doel.filter(d=>acts.some(z=>z.naam===d.naam)).length;
    dichtFn();
    doe({action:'act_kopieer',afdeling_id:afdId,van_afdeling_id:bronAfd.id},
      afdNaam(S.data.afdelingen.find(z=>z.id===afdId))+' — werkdagen overgenomen van '+afdNaam(bronAfd)+' ('+n+' activiteiten)');
    toast('Werkdagen van '+n+' activiteit(en) overgenomen van '+afdNaam(bronAfd));
  });
}

/* ---- Leveringen ---- */
function rLeveringen(app){
  const vandaag=vandaagISO();
  if(!S.levMaand) S.levMaand=vandaag.slice(0,7);
  const alle=S.data.leveringen.slice().sort((a,b)=>String(a.datum||'9999').localeCompare(String(b.datum||'9999')));
  const gefilterd=alle.filter(l=>(!S.levMat||l.materiaal===S.levMat)&&(!S.levBedrijf||levBedrijfNaam(l)===S.levBedrijf));
  const leveranciers=Array.from(new Set(alle.map(l=>levBedrijfNaam(l)))).sort();
  const komend=gefilterd.filter(l=>!l.ontvangen&&(!l.datum||l.datum.slice(0,10)>=vandaag));
  const oud=gefilterd.filter(l=>l.ontvangen||(l.datum&&l.datum.slice(0,10)<vandaag)).reverse();
  const delen=S.levMaand.split('-'); const jr=+delen[0], mnd=+delen[1];
  const eerste=new Date(Date.UTC(jr,mnd-1,1));
  const laatste=new Date(Date.UTC(jr,mnd,0));
  const start=maandagVan(eerste);
  const MND=['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];
  let h='<div class="kaart"><h2>📅 Leverkalender</h2>';
  h+='<div class="keuze" style="margin-bottom:6px"><button data-lm="" class="'+(!S.levMat?'aan':'')+'">alle materialen</button>'
    +['glas','schermdoek','gronddoek','atlasdraad','overig'].map(m=>'<button data-lm="'+m+'" class="'+(S.levMat===m?'aan':'')+'">'+m+'</button>').join('')+'</div>';
  if(leveranciers.length){
    h+='<div class="keuze" style="margin-bottom:8px"><button data-lb="" class="'+(!S.levBedrijf?'aan':'')+'">alle bedrijven</button>'
      +leveranciers.map(n=>'<button data-lb="'+esc(n)+'" class="'+(S.levBedrijf===n?'aan':'')+'"><i class="ldot" style="background:'+levKleur(n)+'"></i> '+esc(n)+'</button>').join('')+'</div>';
  }
  h+='<div class="dagnav"><button id="lm-vorig">‹</button><div class="datum">'+MND[mnd-1]+' '+jr+'</div><button id="lm-volgend">›</button><button id="lm-nu" style="font-size:12px">deze maand</button></div>';
  h+='<div class="kalkop">'+['ma','di','wo','do','vr','za','zo'].map(d=>'<div>'+d+'</div>').join('')+'</div>';
  for(let w=new Date(start); w<=laatste; w.setUTCDate(w.getUTCDate()+7)){
    h+='<div class="kalrij">';
    for(let i=0;i<7;i++){
      const d=new Date(w); d.setUTCDate(d.getUTCDate()+i);
      const dIso=iso(d);
      const dagLevs=gefilterd.filter(l=>l.datum&&l.datum.slice(0,10)===dIso);
      h+='<div class="kaldag'+(d.getUTCMonth()===mnd-1?'':' buiten')+(dIso===vandaag?' nu':'')+(S.levDag===dIso?' sel':'')+'" data-ldag="'+dIso+'">'
        +'<div class="kalnr">'+d.getUTCDate()+'</div>'
        +dagLevs.slice(0,3).map(function(l){ const n=levBedrijfNaam(l);
          return '<div class="kalbalk'+(l.ontvangen?' ok':'')+'" style="border-left-color:'+levKleur(n)+'" title="'+esc(n+' · '+l.materiaal+(l.afdeling_tekst?' · '+l.afdeling_tekst:''))+'">'+esc(n)+' · '+esc(l.materiaal)+(l.ontvangen?' ✓':'')+'</div>'; }).join('')
        +(dagLevs.length>3?'<div class="stil" style="font-size:10px;margin-top:2px">+'+(dagLevs.length-3)+' meer</div>':'')
        +'</div>';
    }
    h+='</div>';
  }
  h+='<div class="stil" style="margin-top:6px">Balkje = levering met bedrijf en materiaal (kleur per bedrijf, vervaagd = ontvangen). Tik een dag voor de details.</div></div>';
  if(S.levDag){
    const dagLevs=gefilterd.filter(l=>l.datum&&l.datum.slice(0,10)===S.levDag);
    h+='<div class="kaart"><h2>📦 '+fmtLang(pd(S.levDag))+'</h2>'
      +(dagLevs.length?dagLevs.map(levRegel).join(''):'<div class="leeg">Geen leveringen'+((S.levMat||S.levBedrijf)?' binnen dit filter':'')+' op deze dag.</div>')
      +'<div style="margin-top:8px"><button class="knop licht klein" id="nl-opdag">➕ levering op deze dag invullen</button></div></div>';
  }
  h+='<div class="kaart" id="nl-kaart"><h2>➕ Nieuwe levering</h2>'
    +'<div class="instelrij"><label>Bedrijf</label><span class="keuze" id="nl-bedrijf">'
    +(S.data.bedrijven||[]).map(b=>'<button data-nb="'+b.id+'" class="'+(S.nlBedrijf===b.id?'aan':'')+'">'+bedrijfDot(b.naam)+esc(b.naam)+'</button>').join('')
    +'<button data-nb="nieuw">+ nieuw bedrijf</button></span></div>'
    +'<div class="instelrij"><label>Materiaal</label><span class="keuze" id="nl-materiaal">'+['glas','schermdoek','gronddoek','atlasdraad','overig'].map((m,i)=>'<button data-mat="'+m+'" class="'+(i===0?'aan':'')+'">'+m+'</button>').join('')+'</span></div>'
    +'<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px">'
    +'<input type="text" id="nl-afd" placeholder="afdeling(en), bv. EW2 afd 1+2" style="flex:1;min-width:150px">'
    +'<input type="text" id="nl-oms" placeholder="omschrijving (aantal kisten …)" style="flex:2;min-width:150px"></div>'
    +'<div class="instelrij" style="align-items:flex-start"><label style="padding-top:8px">Leverdatum(s)</label>'
    +'<span id="nl-datums" style="display:flex;flex-direction:column;gap:6px"><span style="display:flex;gap:4px"><input type="date" class="nl-datum" value="'+vandaag+'"></span></span>'
    +'<button class="knop licht klein" id="nl-meer" title="nog een leverdatum erbij — elke datum wordt een eigen (deel)levering">+ deellevering</button></div>'
    +'<div class="stil" style="margin:4px 0 8px">Meerdere datums? Elke datum wordt een eigen levering, automatisch genummerd als deel 1/2, 2/2 enzovoort.</div>'
    +'<button class="knop breed" id="nl-knop">Toevoegen</button></div>';
  h+='<div class="kaart"><h2>📦 Verwacht'+((S.levMat||S.levBedrijf)?' <span class="stil">(gefilterd)</span>':'')+'</h2>'+(komend.length?komend.map(levRegel).join(''):'<div class="leeg">Niets gepland'+((S.levMat||S.levBedrijf)?' binnen dit filter':'')+'. Leveringen komen ook automatisch binnen via de mail-inbox.</div>')+'</div>';
  h+='<div class="kaart"><h2>Geschiedenis</h2>'+(oud.length?oud.slice(0,30).map(levRegel).join(''):'<div class="leeg">Nog leeg.</div>')+'</div>';
  app.innerHTML=h;
  koppelLev(app);
  app.querySelectorAll('#nl-materiaal button').forEach(b=>b.onclick=()=>{
    app.querySelectorAll('#nl-materiaal button').forEach(x=>x.classList.remove('aan'));
    b.classList.add('aan');
  });
  const zetBedrijfKnoppen=()=>app.querySelectorAll('#nl-bedrijf button').forEach(x=>x.classList.toggle('aan', +x.dataset.nb===S.nlBedrijf));
  app.querySelectorAll('#nl-bedrijf button').forEach(b=>b.onclick=()=>{
    if(b.dataset.nb==='nieuw'){
      bedrijfKiezer('Bedrijf voor deze levering', S.nlBedrijf||null, bid=>{
        S.nlBedrijf=bid;
        if(app.querySelector('#nl-bedrijf button[data-nb="'+bid+'"]')) zetBedrijfKnoppen(); else render();
      });
    } else { S.nlBedrijf=(+b.dataset.nb===S.nlBedrijf)?null:+b.dataset.nb; zetBedrijfKnoppen(); }
  });
  document.getElementById('nl-meer').onclick=()=>{
    const rij=document.createElement('span');
    rij.style.cssText='display:flex;gap:4px';
    rij.innerHTML='<input type="date" class="nl-datum"><button class="pijl nl-wis" title="deze datum weghalen">✕</button>';
    document.getElementById('nl-datums').appendChild(rij);
    rij.querySelector('.nl-wis').onclick=()=>rij.remove();
    rij.querySelector('input').focus();
  };
  const opdag=document.getElementById('nl-opdag');
  if(opdag) opdag.onclick=()=>{
    app.querySelector('.nl-datum').value=S.levDag;
    document.getElementById('nl-kaart').scrollIntoView({behavior:'smooth'});
  };
  document.getElementById('nl-knop').onclick=async()=>{
    const datums=Array.from(app.querySelectorAll('.nl-datum')).map(i=>i.value).filter(Boolean);
    const basis={ bedrijf_id:S.nlBedrijf,
      leverancier:S.nlBedrijf?(bedrijfNaam(S.nlBedrijf)||''):'',
      materiaal:app.querySelector('#nl-materiaal button.aan').dataset.mat,
      afdeling_tekst:document.getElementById('nl-afd').value.trim(),
      omschrijving:document.getElementById('nl-oms').value.trim(), bron:'handmatig ('+S.wie+')' };
    if(!basis.bedrijf_id){toast('Kies eerst een bedrijf');return;}
    if(!datums.length){toast('Vul minstens één leverdatum in');return;}
    datums.sort();
    try{
      for(let i=0;i<datums.length;i++){
        const f=Object.assign({},basis,{datum:datums[i]});
        if(datums.length>1) f.omschrijving=(basis.omschrijving?basis.omschrijving+' · ':'')+'deel '+(i+1)+'/'+datums.length;
        await api({action:'lev_add',fields:f,
          log:'Levering toegevoegd: '+basis.leverancier+' '+basis.materiaal+' '+datums[i]+(datums.length>1?' (deel '+(i+1)+'/'+datums.length+')':'')});
      }
      await laad(); render();
      toast(datums.length>1?datums.length+' deelleveringen toegevoegd':'Levering toegevoegd');
    }catch(e){ toast(e.message||'Toevoegen mislukt'); }
  };
  const maandStap=n=>{ const dd=S.levMaand.split('-'); let j=+dd[0], m=+dd[1]+n;
    if(m<1){m=12;j--;} if(m>12){m=1;j++;}
    S.levMaand=j+'-'+String(m).padStart(2,'0'); render(); };
  document.getElementById('lm-vorig').onclick=()=>maandStap(-1);
  document.getElementById('lm-volgend').onclick=()=>maandStap(1);
  document.getElementById('lm-nu').onclick=()=>{S.levMaand=vandaagISO().slice(0,7);render();};
  app.querySelectorAll('button[data-lm]').forEach(b=>b.onclick=()=>{S.levMat=b.dataset.lm||null;render();});
  app.querySelectorAll('button[data-lb]').forEach(b=>b.onclick=()=>{S.levBedrijf=b.dataset.lb||null;render();});
  app.querySelectorAll('.kaldag[data-ldag]').forEach(el=>el.onclick=()=>{
    S.levDag=(S.levDag===el.dataset.ldag)?null:el.dataset.ldag; render(); });
}

/* ---- Taken ---- */
