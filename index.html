      +(t.bedrijf_id?bedrijfDot(bedrijfNaam(t.bedrijf_id))+esc(bedrijfNaam(t.bedrijf_id))+' · ':'')
      +(t.deadline?'<span class="'+(oud?'deadline-oud':'')+'">'+fmt(pd(t.deadline))+(oud?' ⚠':'')+'</span>':'geen deadline')
      +'</span>'+fotoThumbs(fotos,true)+'</span>'
      +'<button class="pijl" data-tbewerk="'+t.id+'" title="bewerken">✎</button>'
      +'<button class="pijl" data-tfoto="'+t.id+'" title="foto toevoegen">📷</button>'
      +'<button class="pijl" data-tdel="'+t.id+'" title="verwijderen">🗑</button></div>';
  }
  h+='</div>';
  if(klaarAlle.length){
    h+='<div class="kaart"><details class="log"><summary>Afgerond ('+klaarAlle.length+')</summary>'
      +klaarAlle.slice(0,15).map(t=>'<div class="regel"><span style="flex:1">'+esc(t.omschrijving)+'</span><span class="stil">'
      +(t.klaar_door?esc(t.klaar_door)+' · ':'')+(t.klaar_ts?t.klaar_ts.slice(5,10):'')
      +' <button class="knop klein licht" data-theropen="'+t.id+'">heropen</button></span></div>').join('')+'</details></div>';
  }
  app.innerHTML=h;
  app.querySelectorAll('button[data-tf]').forEach(b=>b.onclick=()=>{S.takBedrijf=b.dataset.tf?+b.dataset.tf:null;render();});
  document.getElementById('nt-afd').onclick=()=>afdelingKiezer('Afdeling voor deze taak',id=>{S.ntAfd=id;render();});
  document.getElementById('nt-bedrijf').onclick=()=>bedrijfKiezer('Bedrijf voor deze taak',S.ntBedrijf||null,bid=>{S.ntBedrijf=bid;render();});
  document.getElementById('nt-knop').onclick=()=>{
    const oms=document.getElementById('nt-oms').value.trim();
    if(!oms){toast('Omschrijving invullen');return;}
    const f={omschrijving:oms,afdeling_id:S.ntAfd,bedrijf_id:S.ntBedrijf,deadline:document.getElementById('nt-deadline').value||null};
    S.ntAfd=null;S.ntBedrijf=null;
    doe({action:'taak_add',fields:f}, 'Taak toegevoegd: '+oms);
  };
  koppelTaken(app);
  koppelFotoDel(app);
}
function taakStatusKnop(t){
  const lbl={open:'te doen',bezig:'bezig',klaar:'✓ klaar'}[t.status]||t.status;
  const cls={open:'todo',bezig:'bezig',klaar:'klaar'}[t.status]||'todo';
  return '<button class="statusknop '+cls+'" data-tklaar="'+t.id+'">'+lbl+'</button>';
}
function taakBewerken(taakId){
  const sh=document.getElementById('sheet');
  const dichtFn=()=>{sh.style.display='none';sh.innerHTML='';render();};
  const maak=()=>{
    const t=(S.data.taken||[]).find(x=>x.id===taakId);
    if(!t){ dichtFn(); return; }
    const afdRij=t.afdeling_id?S.data.afdelingen.find(x=>x.id===t.afdeling_id):null;
    let x='<div class="sheetkaart"><div class="sheettitel">✎ Taak bewerken</div>'
      +'<input type="text" id="tb-oms" value="'+esc(t.omschrijving)+'" style="width:100%">'
      +'<div class="sheetrij">'
      +'<button class="knop licht klein" id="tb-afd">'+(afdRij?'📍 '+esc(afdNaam(afdRij)):'📍 afdeling…')+'</button>'
      +'<button class="knop licht klein" id="tb-bedrijf">'+(t.bedrijf_id?bedrijfDot(bedrijfNaam(t.bedrijf_id)||'')+esc(bedrijfNaam(t.bedrijf_id)||''):'🏢 bedrijf…')+'</button>'
      +'<label>deadline</label><input type="date" id="tb-deadline" value="'+(t.deadline?t.deadline.slice(0,10):'')+'"></div>'
      +'<div class="stil">Wijzigingen worden direct opgeslagen.</div>'
      +'<button class="knop licht breed" id="tb-sluit">Klaar</button></div>';
    sh.innerHTML=x; sh.style.display='flex';
    sh.onclick=e=>{ if(e.target===sh) dichtFn(); };
    document.getElementById('tb-sluit').onclick=dichtFn;
    const update=async(fields,log)=>{
      try{ await api({action:'taak_update',id:taakId,fields:fields,log:log}); await laad(); maak(); }
      catch(e){ toast(e.message||'Opslaan mislukt'); }
    };
    document.getElementById('tb-oms').onchange=e=>{
      const v=e.target.value.trim();
      if(v) update({omschrijving:v}, 'Taak aangepast: '+v);
    };
    document.getElementById('tb-deadline').onchange=e=>update({deadline:e.target.value||null}, 'Taak "'+t.omschrijving+'" deadline → '+(e.target.value||'geen'));
    document.getElementById('tb-afd').onclick=()=>{
      afdelingKiezer('Afdeling voor deze taak', id=>{
        (async()=>{ try{ await api({action:'taak_update',id:taakId,fields:{afdeling_id:id},log:'Taak "'+t.omschrijving+'" afdeling gewijzigd'}); await laad(); }catch(e){ toast('Opslaan mislukt'); } taakBewerken(taakId); })();
      });
    };
    document.getElementById('tb-bedrijf').onclick=()=>{
      bedrijfKiezer('Bedrijf voor deze taak', t.bedrijf_id||null, bid=>{
        (async()=>{ try{ await api({action:'taak_update',id:taakId,fields:{bedrijf_id:bid},log:'Taak "'+t.omschrijving+'" bedrijf gewijzigd'}); await laad(); }catch(e){ toast('Opslaan mislukt'); } taakBewerken(taakId); })();
      });
    };
  };
  maak();
}
function koppelTaken(root){
  root.querySelectorAll('button[data-tbewerk]').forEach(b=>b.onclick=()=>taakBewerken(+b.dataset.tbewerk));
  root.querySelectorAll('button[data-tklaar]').forEach(b=>b.onclick=()=>{
    const t=(S.data.taken||[]).find(x=>x.id===+b.dataset.tklaar);
    const volg={open:'bezig',bezig:'klaar'}[t.status]||'klaar';
    doe({action:'taak_update',id:t.id,fields:{status:volg}}, 'Taak "'+t.omschrijving+'" → '+(volg==='klaar'?'afgerond':volg));
  });
  root.querySelectorAll('button[data-theropen]').forEach(b=>b.onclick=()=>{
    const t=(S.data.taken||[]).find(x=>x.id===+b.dataset.theropen);
    doe({action:'taak_update',id:t.id,fields:{status:'open'}}, 'Taak heropend: '+t.omschrijving);
  });
  root.querySelectorAll('button[data-tfoto]').forEach(b=>b.onclick=()=>{
    const t=(S.data.taken||[]).find(x=>x.id===+b.dataset.tfoto);
    maakFoto({taak_id:t.id,afdeling_id:t.afdeling_id}, 'Foto bij taak: '+t.omschrijving);
  });
  root.querySelectorAll('button[data-tdel]').forEach(b=>b.onclick=()=>{
    if(b.dataset.zeker!=='1'){ b.dataset.zeker='1'; toast('Nogmaals tikken om te verwijderen'); return; }
    const t=(S.data.taken||[]).find(x=>x.id===+b.dataset.tdel);
    doe({action:'taak_delete',id:t.id}, 'Taak verwijderd: '+t.omschrijving);
  });
}

/* ---- Voortgang ---- */
function rVoortgang(app){
  const nu=pd(vandaagISO());
  const vandaag=vandaagISO();
  const perCat={}, perBedrijf={};
  const telOp=(map,key,r)=>{
    if(!map[key]) map[key]={klaar:0,bezig:0,todo:0,achter:0,totaal:0};
    const m=map[key]; m.totaal++;
    if(r.a.status==='klaar') m.klaar++;
    else { if(r.a.status==='bezig') m.bezig++; else m.todo++;
      if(r.eind&&r.eind<nu) m.achter++; }
  };
  for(const afd of S.data.afdelingen.filter(a=>a.actief)){
    for(const r of planAfdeling(afd)){
      if(r.a.status==='nvt') continue;
      telOp(perCat, actCats().some(c=>c.naam===r.a.naam)?r.a.naam:'Overige activiteiten', r);
      const b=bedrijfVan(afd,r.a);
      telOp(perBedrijf, b?b.naam:'— nog geen bedrijf', r);
    }
  }
  const klaarActs=[];
  for(const afd of S.data.afdelingen){
    for(const a of S.data.activiteiten.filter(x=>x.afdeling_id===afd.id))
      if(a.klaar_ts&&a.klaar_ts.slice(0,10)===vandaag) klaarActs.push({afd,a});
  }
  const klaarTaken=(S.data.taken||[]).filter(t=>t.klaar_ts&&t.klaar_ts.slice(0,10)===vandaag);
  const rij=(naam,m,dot)=>{
    const pct=m.totaal?Math.round(100*m.klaar/m.totaal):0;
    return '<div class="regel">'+dot
      +'<span style="flex:1;min-width:110px">'+esc(naam)+'<br><span class="stil">'+m.klaar+' klaar · '+m.bezig+' bezig · '+m.todo+' te doen'
      +(m.achter?' · <span class="deadline-oud">'+m.achter+' achter ⚠</span>':'')+'</span></span>'
      +'<div class="balk"><div style="width:'+pct+'%"></div></div><span class="stil" style="min-width:34px;text-align:right">'+pct+'%</span></div>';
  };
  let h='<div class="kaart"><h2>🎉 Vandaag afgerond</h2>';
  if(!klaarActs.length&&!klaarTaken.length) h+='<div class="leeg">Nog niets vandaag afgerond.</div>';
  for(const k of klaarActs) h+='<div class="regel"><span class="chip" style="background:'+kleur(k.a.naam)+'">'+esc(k.a.naam)+'</span><span style="flex:1"><b>'+esc(afdNaam(k.afd))+'</b></span><span class="stil">'+k.a.klaar_ts.slice(11,16)+'</span></div>';
  for(const t of klaarTaken) h+='<div class="regel"><span class="chip" style="background:var(--groen-licht)">taak</span><span style="flex:1">'+esc(t.omschrijving)+'</span><span class="stil">'+esc(t.klaar_door||'')+'</span></div>';
  h+='</div>';
  h+='<div class="kaart"><h2>📊 Per activiteit</h2>';
  for(const cat of actCats()) if(perCat[cat.naam])
    h+=rij(cat.naam,perCat[cat.naam],'<span class="chip" style="background:'+cat.kleur+';width:10px;height:18px;padding:0;border-radius:4px"></span>');
  for(const naam of Object.keys(perCat)) if(!actCats().some(c=>c.naam===naam))
    h+=rij(naam,perCat[naam],'<span class="chip" style="background:#98a2a0;width:10px;height:18px;padding:0;border-radius:4px"></span>');
  h+='</div>';
  const openTaken=(S.data.taken||[]).filter(t=>t.status!=='klaar');
  h+='<div class="kaart"><h2>🏢 Per bedrijf</h2>';
  for(const naam of Object.keys(perBedrijf).sort()){
    h+=rij(naam,perBedrijf[naam],'<i class="ldot" style="background:'+levKleur(naam)+'"></i>');
    const nt=openTaken.filter(t=>t.bedrijf_id&&bedrijfNaam(t.bedrijf_id)===naam).length;
    if(nt) h+='<div class="stil" style="margin:-2px 0 6px 18px">✅ '+nt+' open taak'+(nt>1?'en':'')+'</div>';
  }
  const bedrijvenMetTaken=Array.from(new Set(openTaken.filter(t=>t.bedrijf_id).map(t=>bedrijfNaam(t.bedrijf_id))));
  for(const naam of bedrijvenMetTaken){
    if(perBedrijf[naam]) continue;
    const nt=openTaken.filter(t=>t.bedrijf_id&&bedrijfNaam(t.bedrijf_id)===naam).length;
    h+='<div class="regel"><i class="ldot" style="background:'+levKleur(naam)+'"></i><span style="flex:1">'+esc(naam)+'</span><span class="stil">✅ '+nt+' open taak'+(nt>1?'en':'')+'</span></div>';
  }
  h+='<div class="stil" style="margin-top:6px">Telling over alle actieve afdelingen; "achter" = geplande einddatum verstreken maar nog niet klaar.</div></div>';
  app.innerHTML=h;
}

/* ---- Inbox ---- */
function rInbox(app){
  const open=openVoorstellen();
  const besloten=S.data.voorstellen.filter(v=>v.status!=='open').slice(0,10);
  let h='<div class="kaart"><h2>📬 Voorstellen uit de mail</h2><div class="stil" style="margin-bottom:8px">Claude leest hagelschade@kwekerijbaas.nl en zet hier voorstellen neer. Niets wordt doorgevoerd zonder jouw akkoord.</div>'
    +'<div style="margin-bottom:8px"><button class="knop licht klein" id="vs-plak">📋 Mail plakken</button></div>';
  h+=open.length?open.map(v=>'<div class="kaart voorstel"><div class="bron">'+esc(v.bron)+'</div><div>'+esc(v.omschrijving)+'</div>'
    +((v.payload&&v.payload.type==='mail'&&v.payload.tekst)?'<details><summary class="stil" style="cursor:pointer">volledige tekst</summary><div class="stil" style="white-space:pre-wrap;max-height:40vh;overflow:auto">'+esc(v.payload.tekst)+'</div></details>':'')
    +'<div class="knoppen"><button class="knop klein" data-ok="'+v.id+'">✓ Overnemen</button><button class="knop klein licht" data-wz="'+v.id+'">✎ Aanpassen</button><button class="knop klein licht" data-nee="'+v.id+'">Afwijzen</button></div></div>').join('')
    :'<div class="leeg">Geen open voorstellen. 👍</div>';
  h+='</div>';
  if(besloten.length){ h+='<div class="kaart"><h2>Eerder besloten</h2>'+besloten.map(v=>'<div class="regel"><span style="flex:1">'+esc(v.omschrijving)+'<br><span class="stil">'+esc(v.bron)+'</span></span><span class="stil">'+(v.status==='geaccepteerd'?'✓ overgenomen':'afgewezen')+(v.besluit_door?' door '+esc(v.besluit_door):'')+'</span></div>').join('')+'</div>'; }
  h+='<div class="kaart"><details class="log"><summary>Logboek (laatste wijzigingen)</summary>'
    +(S.data.logboek||[]).map(r=>'<div class="regel"><span style="flex:1">'+esc(r.actie)+'</span><span class="stil">'+esc((r.wie||'')+' · '+r.ts.slice(5,16).replace('T',' '))+'</span></div>').join('')
    +'</details></div>';
  app.innerHTML=h;
  app.querySelectorAll('[data-ok]').forEach(b=>b.onclick=()=>doe({action:'voorstel_besluit',id:+b.dataset.ok,besluit:'geaccepteerd'},'Voorstel #'+b.dataset.ok+' overgenomen'));
  app.querySelectorAll('[data-wz]').forEach(b=>b.onclick=()=>voorstelBewerken(+b.dataset.wz));
  app.querySelectorAll('[data-nee]').forEach(b=>b.onclick=()=>doe({action:'voorstel_besluit',id:+b.dataset.nee,besluit:'afgewezen'},'Voorstel #'+b.dataset.nee+' afgewezen'));
  document.getElementById('vs-plak').onclick=plakSheet;
}

function plakSheet(){
  const sh=document.getElementById('sheet');
  const dichtFn=()=>{sh.style.display='none';sh.innerHTML='';};
  sh.innerHTML='<div class="sheetkaart"><div class="sheettitel">📋 Mail plakken</div>'
    +'<div class="stil">Kopieer de tekst van een mail (of ander bericht) en plak hem hieronder. Hij komt als voorstel in de Inbox; daarna kun je hem aanpassen en overnemen. De uurlijkse mail-lezer kijkt er ook naar en zet er zo mogelijk een kant-en-klaar leveringsvoorstel naast.</div>'
    +'<textarea id="pl-tekst" rows="9" style="width:100%;box-sizing:border-box;border:1.5px solid var(--lijn);border-radius:8px;padding:8px;font:inherit" placeholder="plak hier de mailtekst&hellip;"></textarea>'
    +'<button class="knop breed" id="pl-ok">Toevoegen aan Inbox</button>'
    +'<button class="knop licht breed" id="pl-annuleer">Annuleren</button></div>';
  sh.style.display='flex';
  sh.onclick=e=>{ if(e.target===sh) dichtFn(); };
  document.getElementById('pl-annuleer').onclick=dichtFn;
  document.getElementById('pl-ok').onclick=()=>{
    const t=document.getElementById('pl-tekst').value.trim();
    if(!t){ toast('Plak eerst de tekst'); return; }
    dichtFn();
    doe({action:'mail_plak',tekst:t}, 'Mail geplakt in de Inbox');
  };
}

function voorstelBewerken(vId){
  const v=S.data.voorstellen.find(x=>x.id===vId);
  if(!v) return;
  const sh=document.getElementById('sheet');
  const isLev=v.payload&&v.payload.type==='levering';
  const w=isLev?Object.assign({},v.payload.fields||{}):{omschrijving:v.omschrijving};
  const dichtFn=()=>{sh.style.display='none';sh.innerHTML='';};
  const lees=()=>{
    const el=id=>document.getElementById(id);
    if(isLev){
      w.datum=el('vb-datum').value||null;
      w.materiaal=el('vb-mat').value.trim();
      w.afdeling_tekst=el('vb-afd').value.trim();
      w.omschrijving=el('vb-oms').value.trim();
    } else {
      w.omschrijving=el('vb-oms').value.trim();
    }
  };
  const maak=()=>{
    let x='<div class="sheetkaart"><div class="sheettitel">✎ Voorstel aanpassen en overnemen</div>'
      +'<div class="stil">'+esc(v.bron)+'</div>';
    if(isLev){
      const bNaam=w.bedrijf_id?(bedrijfNaam(w.bedrijf_id)||''):'';
      x+='<div class="sheetrij"><label>Datum</label><input type="date" id="vb-datum" value="'+esc(String(w.datum||'').slice(0,10))+'"></div>'
        +'<div class="sheetrij"><label>Materiaal</label><input type="text" id="vb-mat" value="'+esc(w.materiaal||'')+'" style="flex:1"></div>'
        +'<div class="sheetrij"><label>Afdeling(en)</label><input type="text" id="vb-afd" value="'+esc(w.afdeling_tekst||'')+'" style="flex:1"></div>'
        +'<div class="sheetrij"><label>Omschrijving</label><input type="text" id="vb-oms" value="'+esc(w.omschrijving||'')+'" style="flex:1"></div>'
        +'<div class="sheetrij"><label>Bedrijf</label><button class="knop licht klein" id="vb-bedrijf">'
        +(bNaam?bedrijfDot(bNaam)+esc(bNaam):(w.leverancier?esc(w.leverancier):'kiezen…'))+'</button></div>';
    } else {
      x+='<div class="stil">Dit voorstel is een melding zonder levering; pas de tekst aan zoals jij hem wilt bewaren.</div>'
        +'<div class="sheetrij"><label>Tekst</label><input type="text" id="vb-oms" value="'+esc(w.omschrijving||'')+'" style="flex:1"></div>';
    }
    x+='<button class="knop breed" id="vb-ok">✓ Overnemen met deze wijzigingen</button>'
      +'<button class="knop licht breed" id="vb-annuleer">Annuleren</button></div>';
    sh.innerHTML=x; sh.style.display='flex';
    sh.onclick=e=>{ if(e.target===sh) dichtFn(); };
    document.getElementById('vb-annuleer').onclick=dichtFn;
    const bk=document.getElementById('vb-bedrijf');
    if(bk) bk.onclick=()=>{
      lees();
      bedrijfKiezer('Bedrijf voor deze levering', w.bedrijf_id||null, bid=>{
        w.bedrijf_id=bid;
        if(bid) w.leverancier=bedrijfNaam(bid)||w.leverancier;
        maak();
      });
    };
    document.getElementById('vb-ok').onclick=()=>{
      lees(); dichtFn();
      const req={action:'voorstel_besluit',id:v.id,besluit:'geaccepteerd'};
      if(isLev) req.fields=w; else req.omschrijving=w.omschrijving;
      doe(req,'Voorstel #'+v.id+' aangepast en overgenomen');
    };
  };
  maak();
}

/* ---------- start ---------- */
async function start(){
  document.getElementById('tb-wie').onclick=()=>{ document.getElementById('lg-code').value=S.code||''; toonLogin(); };
  const hash=decodeURIComponent((location.hash||'').slice(1)).trim();
  if(hash){
    const delen=hash.split('/');
    const hashCode=delen[0].trim();
    const hashWie=(delen[1]||'Jarno').trim()||'Jarno';
    try{ history.replaceState(null,'',location.pathname+location.search); }catch(e){}
    if(hashCode){
      const oudeCode=S.code, oudeWie=S.wie;
      S.code=hashCode; S.wie=hashWie;
      try{ await laad();
        localStorage.setItem('rp_code',S.code); localStorage.setItem('rp_wie',S.wie);
        render(); return;
      }catch(e){ S.code=oudeCode; S.wie=oudeWie; }
    }
  }
  if(!S.code){ toonLogin(); return; }
  try{ await laad(); render(); }
  catch(e){ if(e.auth) toonLogin(); else { document.getElementById('app').innerHTML='<div class="leeg">Kan de planning niet laden — check je internetverbinding en ververs de pagina.</div>'; } }
}
function toonLogin(){
  const lg=document.getElementById('login'); lg.style.display='flex';
  const sluit=document.getElementById('lg-sluit');
  sluit.style.display=S.data?'block':'none';
  sluit.onclick=()=>{ lg.style.display='none'; };
  lg.querySelectorAll('#lg-namen button').forEach(b=>b.onclick=async()=>{
    S.code=document.getElementById('lg-code').value.trim();
    S.wie=b.dataset.naam;
    try{ await laad();
      localStorage.setItem('rp_code',S.code); localStorage.setItem('rp_wie',S.wie);
      document.getElementById('lg-fout').style.display='none';
      lg.style.display='none'; render();
    }catch(e){ document.getElementById('lg-fout').style.display='block'; }
  });
}
setInterval(async()=>{ if(S.data&&document.visibilityState==='visible'){ try{ await laad(); render(); }catch(e){} } }, 90000);
document.addEventListener('visibilitychange',async()=>{ if(document.visibilityState==='visible'&&S.data){ try{ await laad(); render(); }catch(e){} } });
start();
</script>
